            { id: 17, type: "4", name: "Salmone al forno al rosmarino con zucca e riso", ingredients: [{ name: "Salmone fresco", qty: 200, unit: "g" }, { name: "Zucca", qty: 200, unit: "g" }, { name: "Riso", qty: 40, unit: "g" }] },
            { id: 18, type: "4", name: "CREMA di CAROTE e ZENZERO con NASELLO", ingredients: [{ name: "Nasello", qty: 250, unit: "g" }, { name: "Carote", qty: 200, unit: "g" }, { name: "Zenzero", qty: 1, unit: "qb" }, { name: "Pane", qty: 60, unit: "g" }] },
            { id: 19, type: "4", name: "Orata al Cartoccio con Patate", ingredients: [{ name: "Orata filetti", qty: 200, unit: "g" }, { name: "Patate", qty: 200, unit: "g" }, { name: "Pomodorini", qty: 50, unit: "g" }] },
            { id: 20, type: "F", name: "Pizza fatta in casa", ingredients: [{ name: "Farina", qty: 150, unit: "g" }, { name: "Mozzarella per pizza", qty: 100, unit: "g" }, { name: "Passata di pomodoro", qty: 80, unit: "g" }] },
            { id: 21, type: "F", name: "Lasagne al forno", ingredients: [{ name: "Sfoglia lasagne", qty: 100, unit: "g" }, { name: "Macinato misto", qty: 100, unit: "g" }, { name: "Besciamella", qty: 50, unit: "ml" }] }
        ];

        const DEFAULT_PLAN = [
          { day: "Lunedì", meal: "Pranzo", note: "", tracks: { plan_1: { type: "2", recipe: 7, portions: 1 }, famiglia: { type: "", recipe: 7, portions: 2 } } },
          { day: "Lunedì", meal: "Cena", note: "", tracks: { plan_1: { type: "3", recipe: 12, portions: 1 }, famiglia: { type: "", recipe: 12, portions: 5 } } },
          { day: "Martedì", meal: "Pranzo", note: "", tracks: { plan_1: { type: "4", recipe: 16, portions: 1 }, famiglia: { type: "", recipe: 16, portions: 2 } } },
          { day: "Martedì", meal: "Cena", note: "", tracks: { plan_1: { type: "3", recipe: 12, portions: 1 }, famiglia: { type: "", recipe: 1, portions: 5 } } },
          { day: "Mercoledì", meal: "Pranzo", note: "", tracks: { plan_1: { type: "1", recipe: 1, portions: 1 }, famiglia: { type: "", recipe: 1, portions: 2 } } },
          { day: "Mercoledì", meal: "Cena", note: "", tracks: { plan_1: { type: "4", recipe: 17, portions: 1 }, famiglia: { type: "", recipe: 4, portions: 5 } } },
          { day: "Giovedì", meal: "Pranzo", note: "", tracks: { plan_1: { type: "2", recipe: 8, portions: 1 }, famiglia: { type: "", recipe: 9, portions: 2 } } },
          { day: "Giovedì", meal: "Cena", note: "", tracks: { plan_1: { type: "3", recipe: 12, portions: 1 }, famiglia: { type: "", recipe: 12, portions: 4 } } },
          { day: "Venerdì", meal: "Pranzo", note: "", tracks: { plan_1: { type: "2", recipe: 10, portions: 1 }, famiglia: { type: "", recipe: 10, portions: 3 } } },
          { day: "Venerdì", meal: "Cena", note: "", tracks: { plan_1: { type: "3", recipe: 12, portions: 1 }, famiglia: { type: "", recipe: 4, portions: 4 } } },
          { day: "Sabato", meal: "Pranzo", note: "", tracks: { plan_1: { type: "4", recipe: "", portions: 1 }, famiglia: { type: "", recipe: "", portions: 2 } } },
          { day: "Sabato", meal: "Cena", note: "", tracks: { plan_1: { type: "LIBERO", recipe: "", portions: 1 }, famiglia: { type: "", recipe: "", portions: 4 } } },
          { day: "Domenica", meal: "Pranzo", note: "", tracks: { plan_1: { type: "LIBERO", recipe: "", portions: 1 }, famiglia: { type: "", recipe: "", portions: 2 } } },
          { day: "Domenica", meal: "Cena", note: "", tracks: { plan_1: { type: "LIBERO", recipe: "", portions: 1 }, famiglia: { type: "", recipe: "", portions: 4 } } },
        ];

        // --- VALIDATORE DIETA (dinamico per N piani) ---
        const DietValidator = ({ plan, dietPlans }) => {
            const activePlans = dietPlans.filter(p => !p.isFreeTrack && p.categories.length > 0);
            if (activePlans.length === 0) return null;

            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2">
                        <Icons.Check /> Controllo Dieta
                    </h3>
                    <div className="space-y-4">
                        {activePlans.map(dp => {
                            const colors = PLAN_COLORS[dp.color] || PLAN_COLORS.blue;
                            const counts = {};
                            dp.categories.forEach(c => { counts[c.id] = 0; });
                            const conflicts = [];

                            for (let i = 0; i < plan.length; i += 2) {
                                const lunchTrack = plan[i]?.tracks?.[dp.id];
                                const dinnerTrack = plan[i+1]?.tracks?.[dp.id];
                                const t1 = lunchTrack?.type || '';
                                const t2 = dinnerTrack?.type || '';

                                if (counts[t1] !== undefined) counts[t1]++;
                                if (counts[t2] !== undefined) counts[t2]++;

                                // Controlla conflitti configurati (formato "a:b")
                                (dp.conflicts || []).forEach(c => {
                                    const [a, b] = c.split(':');
                                    if ((t1 === a && t2 === b) || (t1 === b && t2 === a)) {
                                        conflicts.push(plan[i].day);
                                    }
                                });
                            }

                            return (
                                <div key={dp.id}>
                                    <div className={`text-xs font-bold ${colors.label} mb-1.5`}>{dp.name}</div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                        {dp.categories.map(cat => {
                                            const count = counts[cat.id] || 0;
                                            const isExact = count === cat.target;
                                            const isOver = count > cat.target;
                                            const statusColor = isExact ? 'bg-emerald-100 text-emerald-800 border-emerald-200' :
                                                              isOver ? 'bg-red-100 text-red-800 border-red-200' :
                                                              'bg-slate-100 text-slate-600 border-slate-200';
                                            return (
                                                <div key={cat.id} className={`border rounded-lg p-1.5 flex flex-col items-center ${statusColor}`}>
                                                    <span className="text-xs font-bold uppercase">{cat.label}</span>
                                                    <span className="text-lg font-black">{count}/{cat.target}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {conflicts.length > 0 && (
                                        <div className="bg-red-50 border border-red-200 rounded-lg p-2 flex items-start gap-2 mt-1">
                                            <div className="text-red-500 mt-0.5"><Icons.Alert /></div>
                                            <div>
                                                <strong className="text-red-800 text-xs block">Conflitto rilevato!</strong>
                                                <p className="text-red-600 text-xs">{conflicts.join(', ')}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- HELPERS DATE ---
        const getMonday = (d) => {
            d = new Date(d);
            const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); 
            return new Date(d.setDate(diff));
        }
        const formatDateKey = (date) => date.toISOString().split('T')[0];
        const formatDateDisplay = (dateStr) => new Date(dateStr).toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
        const getDatesOfWeek = (start) => Array.from({length: 7}, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });

        // --- HELPERS STAMPA ---
        // Sanitizza stringa per inserimento in HTML (previene XSS)
        const escapeHtml = (str) => {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        };

        // Risolve ricetta per ID (o per nome per retrocompatibilità)
        const getRecipeById = (recipeId, recipes) => {
            if (!recipeId) return null;
            if (typeof recipeId === 'number') return recipes.find(r => r.id === recipeId) || null;
            return recipes.find(r => r.name === recipeId) || null; // fallback nome per dati vecchi
        };

        const getIngredientsSummary = (recipeId, portions, recipes) => {
            if (!recipeId || portions <= 0) return null;
            const rec = getRecipeById(recipeId, recipes);
            if (!rec) return null;
            return rec.ingredients.map(ing => `${ing.name}: ${ing.qty * portions}${ing.unit}`).join(', ');
        };

        // Migra piano da formato nome (vecchio) a formato ID (nuovo)
        const migratePlanToIds = (plan, recipes) => {
            let changed = false;
            const migrated = plan.map(slot => {
                const s = { ...slot };
                if (typeof s.myRecipe === 'string' && s.myRecipe !== '') {
                    const found = recipes.find(r => r.name === s.myRecipe);
                    s.myRecipe = found ? found.id : '';
                    changed = true;
                }
                if (typeof s.famRecipe === 'string' && s.famRecipe !== '') {
                    const found = recipes.find(r => r.name === s.famRecipe);
                    s.famRecipe = found ? found.id : '';
                    changed = true;
                }
                return s;
            });
            return { migrated, changed };
        };

        // --- COMPONENTI UI ---
        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${className}`}>{children}</div>;
        const Modal = ({ isOpen, onClose, title, children }) => {
            const modalRef = useRef(null);

            useEffect(() => {
                if (!isOpen) return;
                const handleKeyDown = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handleKeyDown);
                // Focus trap: focus first focusable element
                setTimeout(() => {
                    const el = modalRef.current?.querySelector('button, input, select, textarea');
                    if (el) el.focus();
                }, 50);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, [isOpen]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 animate-fade-in" role="dialog" aria-modal="true" aria-label={title} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div ref={modalRef} className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] flex flex-col">
                        <div className="flex justify-between items-center p-4 border-b">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full" aria-label="Chiudi"><Icons.X /></button>
                        </div>
                        <div className="p-4 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- FORM RICETTA ---
        const RecipeForm = ({ onSave, initialData }) => {
            const [recipeData, setRecipeData] = useState(initialData || { name: '', type: '1', ingredients: [] });
            const [tempIng, setTempIng] = useState({ name: '', qty: '', unit: 'g' });

            useEffect(() => {
                setRecipeData(initialData || { name: '', type: '1', ingredients: [] });
                setTempIng({ name: '', qty: '', unit: 'g' });
            }, [initialData]);

            const addIngredient = () => {
                if (!tempIng.name || !tempIng.qty) return;
                const qtyNum = parseFloat(tempIng.qty.toString().replace(',', '.'));
                if (isNaN(qtyNum)) return;
                setRecipeData(prev => ({ ...prev, ingredients: [...prev.ingredients, { ...tempIng, qty: qtyNum }] }));
                setTempIng({ name: '', qty: '', unit: 'g' });
            };

            const handleSave = () => {
                if (!recipeData.name) { alert("Nome ricetta obbligatorio"); return; }
                let finalIngredients = [...recipeData.ingredients];
                if (tempIng.name && tempIng.qty) {
                     const qtyNum = parseFloat(tempIng.qty.toString().replace(',', '.'));
                     if (!isNaN(qtyNum)) finalIngredients.push({ ...tempIng, qty: qtyNum });
                }
                onSave({ ...recipeData, ingredients: finalIngredients });
            };

            const guideline = DIET_GUIDELINES[recipeData.type];

            return (
                <div className="space-y-4 flex flex-col h-full">
                    <div className="flex-1 space-y-4">
                        <div>
                            <label className="block text-sm font-bold mb-1">Nome Piatto</label>
                            <input className="w-full border rounded p-2" value={recipeData.name} onChange={e => setRecipeData({...recipeData, name: e.target.value})} placeholder="Es. Pasta al Pomodoro" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold mb-1">Tipologia</label>
                            <select className="w-full border rounded p-2" value={recipeData.type} onChange={e => setRecipeData({...recipeData, type: e.target.value})}>
                                {MEAL_TYPES.map(t => <option key={t} value={t.split(' ')[0]}>{t}</option>)}
                            </select>
                        </div>

                        {guideline && (
                            <div className="bg-blue-50 border-l-4 border-blue-500 p-3 rounded text-xs text-blue-800 mb-2 flex gap-2">
                                <div className="mt-0.5"><Icons.Info /></div>
                                <div>
                                    <strong>Promemoria Dosi:</strong><br/>
                                    {guideline}
                                </div>
                            </div>
                        )}

                        <div className="bg-slate-50 p-3 rounded">
                            <h4 className="text-sm font-bold mb-2">Ingredienti</h4>
                            
                            <div className="flex flex-col gap-2 mb-3">
                                <input 
                                    className="w-full border rounded p-2 text-sm" 
                                    placeholder="Nome Ingrediente" 
                                    value={tempIng.name} 
                                    onChange={e => setTempIng({...tempIng, name: e.target.value})} 
                                />
                                <div className="flex gap-2">
                                    <input 
                                        className="w-24 border rounded p-2 text-sm" 
                                        type="text" 
                                        inputMode="decimal" 
                                        placeholder="Qtà" 
                                        value={tempIng.qty} 
                                        onChange={e => setTempIng({...tempIng, qty: e.target.value})} 
                                    />
                                    <select 
                                        className="w-20 border rounded text-sm bg-white" 
                                        value={tempIng.unit} 
                                        onChange={e => setTempIng({...tempIng, unit: e.target.value})}
                                    >
                                        <option value="g">g</option>
                                        <option value="ml">ml</option>
                                        <option value="pz">pz</option>
                                        <option value="qb">qb</option>
                                    </select>
                                    <button 
                                        onClick={addIngredient} 
                                        className="flex-grow bg-emerald-600 text-white rounded-lg font-bold shadow-sm hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center"
                                        title="Aggiungi Ingrediente"
                                    >
                                        <span className="flex items-center gap-1">
                                            <Icons.Plus /> 
                                            <span className="text-sm">Aggiungi</span>
                                        </span>
                                    </button>
                                </div>
                            </div>
                            
                            <ul className="text-sm space-y-1 mt-3">
                                {recipeData.ingredients.map((ing, idx) => (
                                    <li key={idx} className="flex justify-between bg-white p-2 rounded border border-slate-100 items-center shadow-sm">
                                        <span>{ing.name} ({ing.qty}{ing.unit})</span>
                                        <button onClick={() => setRecipeData(p => ({...p, ingredients: p.ingredients.filter((_,i)=>i!==idx)}))} className="text-red-500 font-bold px-2 hover:bg-red-50 rounded">x</button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                    <div className="pt-4 mt-auto border-t border-slate-100 sticky bottom-0 bg-white">
                        <button onClick={handleSave} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-md active:translate-y-0.5 transition-all">{initialData ? "Salva Modifiche" : "Crea Ricetta"}</button>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE AI RECIPE GENERATOR ---
        const COOKING_METHODS = ['Padella', 'Forno', 'Bollitura', 'Griglia', 'Frittura', 'Friggitrice ad aria', 'Vapore', 'Pentola a pressione', 'Crudo/Insalata', 'Slow cooker'];

        const AIRecipeGenerator = ({ isOpen, onClose, recipes, onAddRecipes, dietPlans, onOpenSettings }) => {
            const [ingredientsText, setIngredientsText] = useState('');
            const [recipeType, setRecipeType] = useState('');
            const [maxTime, setMaxTime] = useState('');
            const [contextText, setContextText] = useState('');
            const [selectedMethods, setSelectedMethods] = useState([]);
            const [selectedPlanId, setSelectedPlanId] = useState('');
            const [generatedRecipes, setGeneratedRecipes] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => { if (!isOpen) { setGeneratedRecipes([]); setError(null); setLoading(false); } }, [isOpen]);

            const toggleMethod = (method) => {
                setSelectedMethods(prev => prev.includes(method) ? prev.filter(m => m !== method) : [...prev, method]);
            };

            const handleGenerate = async () => {
                setLoading(true);
                setError(null);
                setGeneratedRecipes([]);

                const targetPlan = selectedPlanId ? dietPlans.find(p => p.id === selectedPlanId) : null;
                const body = {
                    mode: 'from_ingredients',
                    dietPlans: dietPlans || [],
                    targetPlan: targetPlan || undefined,
                    cookingMethods: selectedMethods.length > 0 ? selectedMethods : undefined,
                    context: contextText || undefined,
                    ingredients: ingredientsText,
                    recipeType: recipeType || undefined,
                    maxTime: maxTime || undefined,
                };

                try {
                    const resp = await fetch('/.netlify/functions/generate-recipe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Errore nella generazione');
                    setGeneratedRecipes(data.recipes || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const addRecipe = (recipe) => {
                const { prepTime, tip, ...recipeData } = recipe;
                onAddRecipes([recipeData]);
                setGeneratedRecipes(prev => prev.filter(r => r.name !== recipe.name));
            };

            const addAll = () => {
                onAddRecipes(generatedRecipes.map(({ prepTime, tip, ...r }) => r));
                setGeneratedRecipes([]);
            };

            if (!isOpen) return null;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Genera Ricette con AI">
                    <div className="space-y-4">
                        {/* Selezione piano alimentare */}
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">Per quale piano?</label>
                            <div className="flex gap-2 items-center">
                                <select className="flex-1 border rounded p-1.5 text-sm" value={selectedPlanId} onChange={(e) => setSelectedPlanId(e.target.value)}>
                                    <option value="">Qualsiasi piano</option>
                                    {(dietPlans || []).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                </select>
                                <button onClick={() => { onClose(); onOpenSettings(); }} className="text-xs text-violet-600 underline hover:text-violet-800 font-medium whitespace-nowrap">Modifica piani</button>
                            </div>
                        </div>

                        {/* Metodi di cottura preferiti */}
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1.5">Metodi di cottura preferiti (opzionale)</label>
                            <div className="flex flex-wrap gap-1.5">
                                {COOKING_METHODS.map(method => (
                                    <button key={method} onClick={() => toggleMethod(method)}
                                        className={`text-xs px-2.5 py-1 rounded-full border font-medium transition-all ${selectedMethods.includes(method) ? 'bg-violet-600 text-white border-violet-600' : 'bg-white text-slate-600 border-slate-200 hover:border-violet-300'}`}>
                                        {method}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Ingredienti */}
                        <div className="space-y-3">
                            <div>
                                <label className="block text-sm font-bold mb-1">Cosa hai in casa?</label>
                                <textarea
                                    className="w-full border rounded-lg p-3 text-sm"
                                    rows="2"
                                    placeholder="Es: petto di pollo, zucchine, riso, pomodorini, parmigiano..."
                                    value={ingredientsText}
                                    onChange={(e) => setIngredientsText(e.target.value)}
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-0.5">Tipo (opzionale)</label>
                                    <select className="w-full border rounded p-1.5 text-sm" value={recipeType} onChange={(e) => setRecipeType(e.target.value)}>
                                        <option value="">Qualsiasi</option>
                                        {MEAL_TYPES.filter(t => t !== 'LIBERO').map(t => <option key={t} value={t.split(' ')[0]}>{t}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-0.5">Tempo max</label>
                                    <select className="w-full border rounded p-1.5 text-sm" value={maxTime} onChange={(e) => setMaxTime(e.target.value)}>
                                        <option value="">Qualsiasi</option>
                                        <option value="15">15 min</option>
                                        <option value="30">30 min</option>
                                        <option value="45">45 min</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Contesto / note per questa richiesta */}
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-0.5">Indicazioni per questa volta (opzionale)</label>
                            <input type="text" className="w-full border rounded p-2 text-sm" placeholder="Es: stasera ho poco tempo, preferisco qualcosa al forno, i bambini hanno amici a cena..." value={contextText} onChange={(e) => setContextText(e.target.value)} />
                        </div>

                        {/* Bottone genera */}
                        <button
                            onClick={handleGenerate}
                            disabled={loading || !ingredientsText.trim()}
                            className="w-full bg-violet-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0.5 transition-all flex items-center justify-center gap-2"
                        >
                            {loading ? (
                                <><svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Generazione in corso...</>
                            ) : (
                                <><Icons.Sparkle /> Genera Ricette</>
                            )}
                        </button>

                        {/* Errore */}
                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm">{error}</div>
                        )}

                        {/* Risultati */}
                        {generatedRecipes.length > 0 && (
                            <div className="space-y-3 border-t pt-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800">Ricette Generate ({generatedRecipes.length})</h3>
                                    {generatedRecipes.length > 1 && (
                                        <button onClick={addAll} className="text-sm bg-emerald-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-emerald-700">
                                            Aggiungi Tutte
                                        </button>
                                    )}
                                </div>
                                {generatedRecipes.map((recipe, idx) => (
                                    <div key={idx} className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <span className="font-bold text-slate-800">{recipe.name}</span>
                                                <div className="flex gap-1 mt-1">
                                                    <span className="text-xs bg-slate-200 px-2 py-0.5 rounded-full">{typeLabels[recipe.type] || recipe.type}</span>
                                                    {recipe.prepTime && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">{recipe.prepTime} min</span>}
                                                </div>
                                            </div>
                                            <button onClick={() => addRecipe(recipe)} className="text-sm bg-emerald-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-emerald-700 shrink-0">
                                                + Aggiungi
                                            </button>
                                        </div>
                                        <div className="text-xs text-slate-500">
                                            {recipe.ingredients.map((ing, j) => (
                                                <span key={j}>{j > 0 ? ' · ' : ''}{ing.name} {ing.qty}{ing.unit}</span>
                                            ))}
                                        </div>
                                        {recipe.tip && (
                                            <div className="mt-2 text-xs bg-amber-50 text-amber-800 px-2 py-1 rounded border border-amber-200">
                                                💡 {recipe.tip}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </Modal>
            );
        };

        // Helper: renderizza un singolo track (binario) per un meal slot
        const MealTrack = ({ slotIndex, trackId, track, dietPlan, recipes, updatePlan }) => {
            const colors = PLAN_COLORS[dietPlan.color] || PLAN_COLORS.blue;
            const mealTypes = getMealTypesForPlan(dietPlan);
            const allRecipes = [...recipes].sort((a, b) => a.name.localeCompare(b.name));

            const filteredRecipes = dietPlan.isFreeTrack
                ? allRecipes
                : recipes.filter(r => r.type === track.type || track.type === 'LIBERO' || !track.type);

            return (
                <div className="grid grid-cols-[auto_1fr] gap-1.5 items-center">
                    <div className={`text-xs font-bold ${colors.label} w-12 truncate`}>{dietPlan.name}</div>
                    <div className="flex gap-1 items-center">
                        {!dietPlan.isFreeTrack && (
                            <select value={track.type || ''} onChange={(e) => updatePlan(slotIndex, trackId, 'type', e.target.value)}
                                className="text-xs bg-white border border-slate-200 rounded px-1 py-1 outline-none font-medium w-20 flex-shrink-0">
                                <option value="">--</option>
                                {mealTypes.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                            </select>
                        )}
                        <select value={track.recipe || ''} onChange={(e) => updatePlan(slotIndex, trackId, 'recipe', e.target.value ? Number(e.target.value) : '')}
                            className="w-full text-sm border rounded px-2 py-1 outline-none text-slate-700 bg-white min-w-0">
                            <option value="">-- Seleziona --</option>
                            {filteredRecipes.map(r => <option key={r.id} value={r.id}>{r.type === 'F' ? '★ ' : ''}{r.name}</option>)}
                        </select>
                        <input type="number" min="0" step="0.5" className="w-12 text-center text-sm border rounded flex-shrink-0"
                            value={track.portions} onChange={(e) => updatePlan(slotIndex, trackId, 'portions', parseFloat(e.target.value) || 0)} />
                    </div>
                </div>
            );
        };

        const PlannerView = ({ plan, updatePlan, recipes, dietPlans, currentWeek, changeWeek, resetData, handlePrint }) => {
            const weekDates = getDatesOfWeek(currentWeek);
            return (
                <div className="space-y-6 pb-20">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                        <div className="flex items-center gap-4 bg-white p-2 rounded-full shadow-sm">
                            <button onClick={() => changeWeek(-7)} className="p-2 hover:bg-slate-100 rounded-full" aria-label="Settimana precedente"><Icons.Left /></button>
                            <span className="font-bold text-slate-700 min-w-[150px] text-center">{formatDateDisplay(currentWeek)}</span>
                            <button onClick={() => changeWeek(7)} className="p-2 hover:bg-slate-100 rounded-full" aria-label="Settimana successiva"><Icons.Right /></button>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handlePrint} className="bg-slate-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 shadow-sm text-sm font-bold"><Icons.Print /> Stampa</button>
                        </div>
                    </div>

                    <DietValidator plan={plan} dietPlans={dietPlans} />

                    <div className="grid grid-cols-1 gap-6">
                        {Array.from({ length: 7 }).map((_, i) => {
                            const dateObj = weekDates[i];
                            const lunchIndex = i * 2;
                            const dinnerIndex = i * 2 + 1;
                            const lunch = plan[lunchIndex];
                            const dinner = plan[dinnerIndex];

                            return (
                                <Card key={i} className="p-4 border-l-4 border-l-slate-400">
                                    <div className="flex flex-col gap-4">
                                        <div className="border-b border-slate-100 pb-2 mb-1">
                                            <span className="font-bold text-lg text-slate-800 capitalize">{dateObj.toLocaleDateString('it-IT', {weekday: 'long'})}</span>
                                            <span className="text-slate-400 ml-2 text-sm">{dateObj.toLocaleDateString('it-IT', {day: 'numeric', month: 'short'})}</span>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* PRANZO */}
                                            <div className="flex flex-col gap-2">
                                                <div className="bg-slate-50 p-2 rounded">
                                                    <span className="font-bold text-sm text-slate-600">PRANZO</span>
                                                </div>
                                                {dietPlans.map(dp => (
                                                    <MealTrack key={dp.id} slotIndex={lunchIndex} trackId={dp.id}
                                                        track={lunch.tracks?.[dp.id] || { type: '', recipe: '', portions: 1 }}
                                                        dietPlan={dp} recipes={recipes} updatePlan={updatePlan} />
                                                ))}
                                                <input type="text" placeholder="Note..." value={lunch.note || ''} onChange={(e) => updatePlan(lunchIndex, null, 'note', e.target.value)} className="w-full text-xs border border-dashed border-slate-200 rounded px-2 py-1 text-slate-400 focus:text-slate-700 focus:border-slate-400 outline-none mt-1" />
                                            </div>

                                            {/* CENA */}
                                            <div className="flex flex-col gap-2">
                                                <div className="bg-slate-50 p-2 rounded">
                                                    <span className="font-bold text-sm text-slate-600">CENA</span>
                                                </div>
                                                {dietPlans.map(dp => (
                                                    <MealTrack key={dp.id} slotIndex={dinnerIndex} trackId={dp.id}
                                                        track={dinner.tracks?.[dp.id] || { type: '', recipe: '', portions: 1 }}
                                                        dietPlan={dp} recipes={recipes} updatePlan={updatePlan} />
                                                ))}
                                                <input type="text" placeholder="Note..." value={dinner.note || ''} onChange={(e) => updatePlan(dinnerIndex, null, 'note', e.target.value)} className="w-full text-xs border border-dashed border-slate-200 rounded px-2 py-1 text-slate-400 focus:text-slate-700 focus:border-slate-400 outline-none mt-1" />
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ShoppingListView = ({ shoppingList, handleCopy, checkedItems, toggleCheck }) => {
            const grouped = useMemo(() => {
                const groups = {};
                shoppingList.forEach(item => {
                    const cat = getIngredientCategory(item.name);
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });
                return CATEGORY_ORDER.filter(c => groups[c]).map(c => ({ category: c, items: groups[c] }));
            }, [shoppingList]);

            return (
                <div className="space-y-6 pb-20">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Lista Spesa</h2>
                        <button onClick={handleCopy} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">Copia Tutto</button>
                    </div>
                    {shoppingList.length === 0 ? (
                        <div className="bg-white rounded-xl shadow p-8 text-center text-slate-400">Lista vuota.</div>
                    ) : (
                        <div className="space-y-4">
                            {grouped.map(({ category, items }) => (
                                <div key={category} className="bg-white rounded-xl shadow overflow-hidden">
                                    <div className={`px-4 py-2 font-bold text-sm ${CATEGORY_COLORS[category] || 'bg-slate-100 text-slate-700'}`}>
                                        {category} ({items.length})
                                    </div>
                                    {items.map((item, idx) => (
                                        <div key={idx} onClick={() => toggleCheck(item.name)} className={`flex justify-between p-4 border-b border-slate-100 cursor-pointer hover:bg-slate-50 ${checkedItems[item.name] ? 'bg-slate-50 opacity-40' : ''}`}>
                                            <div className="flex items-center gap-3">
                                                <div className={`w-5 h-5 rounded border flex items-center justify-center ${checkedItems[item.name] ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'}`}>
                                                    {checkedItems[item.name] && <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>}
                                                </div>
                                                <span className={checkedItems[item.name] ? 'line-through text-slate-400' : 'text-slate-800'}>{item.name}</span>
                                            </div>
                                            <span className="font-bold text-slate-600 text-sm bg-slate-100 px-2 py-1 rounded">{item.qty} {item.unit}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}
                    <div className="text-center text-xs text-slate-400">Sincronizzazione Cloud Attiva</div>
                </div>
            );
        };

        const RecipesView = ({ recipes, deleteRecipe, onAddRecipe, onEditRecipe, onImportRecipes, openAIModal }) => {
            const [filter, setFilter] = useState('ALL');
            const fileInputRef = useRef(null); // Ref for file input

            const filteredRecipes = useMemo(() => {
                if (filter === 'ALL') return recipes;
                return recipes.filter(r => r.type === filter);
            }, [recipes, filter]);

            const handleImportClick = () => {
                fileInputRef.current.click();
            };

            const handleFileChange = (e) => {
                onImportRecipes(e);
            };

            return (
                <div className="space-y-6 pb-20">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Database</h2>
                        <div className="flex gap-2">
                            {/* Import Button */}
                            <input 
                                type="file" 
                                accept=".csv" 
                                ref={fileInputRef} 
                                style={{display: 'none'}} 
                                onChange={handleFileChange} 
                            />
                            <button onClick={handleImportClick} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-slate-300 flex items-center gap-2">
                                <Icons.Upload /> <span className="hidden md:inline">Importa</span>
                            </button>

                            <button onClick={() => exportRecipesCSV()} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-slate-300 flex items-center gap-2">
                                <Icons.Download /> <span className="hidden md:inline">Esporta</span>
                            </button>
                            <button onClick={() => openAIModal()} className="bg-violet-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-violet-700 flex items-center gap-1"><Icons.Sparkle /> <span className="hidden md:inline">AI</span></button>
                            <button onClick={onAddRecipe} className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700">+ Nuova</button>
                        </div>
                    </div>
                    <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        <button onClick={() => setFilter('ALL')} className={`px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === 'ALL' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>Tutti</button>
                        {MEAL_TYPES.map(typeStr => {
                            const typeKey = typeStr.split(' ')[0];
                            const label = typeStr.includes('(') ? typeStr.split('(')[1].replace(')', '') : typeStr;
                            if (typeStr === 'LIBERO') return null;
                            return (
                                <button key={typeKey} onClick={() => setFilter(typeKey)} className={`px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filter === typeKey ? 'bg-emerald-600 text-white' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>{label}</button>
                            );
                        })}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredRecipes.map(recipe => (
                            <Card key={recipe.id} className="flex flex-col h-full relative group">
                                <div className="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-start">
                                    <div>
                                        <div className="font-bold text-slate-800 pr-2">{recipe.name}</div>
                                        <div className={`text-xs inline-block px-2 py-0.5 rounded mt-1 font-bold ${recipe.type === 'F' ? 'bg-orange-200 text-orange-800' : 'bg-slate-200 text-slate-500'}`}>
                                            Tipo: {MEAL_TYPES.find(t => t.startsWith(recipe.type)) || 'N/D'}
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => onEditRecipe(recipe)} className="text-slate-400 hover:text-blue-500" aria-label={`Modifica ${recipe.name}`}><Icons.Edit /></button>
                                        <button onClick={() => deleteRecipe(recipe.id)} className="text-slate-400 hover:text-red-500" aria-label={`Elimina ${recipe.name}`}><Icons.Trash /></button>
                                    </div>
                                </div>
                                <div className="p-4 flex-grow">
                                    <ul className="space-y-2 text-sm">
                                        {recipe.ingredients.map((ing, i) => <li key={i} className="flex justify-between border-b border-slate-50 pb-1 last:border-0"><span className="text-slate-600">{ing.name}</span><span className="font-medium text-slate-400">{ing.qty} {ing.unit}</span></li>)}
                                    </ul>
                                </div>
                            </Card>
                        ))}
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPALE ---

        // --- SEZIONE PIANI ALIMENTARI ---
        const SettingsView = ({ dietPlans, onSavePlans, resetData }) => {
            const [localPlans, setLocalPlans] = useState(dietPlans);
            const [saved, setSaved] = useState(false);
            useEffect(() => { setLocalPlans(dietPlans); }, [dietPlans]);

            const updatePlan = (planId, updates) => {
                setLocalPlans(prev => prev.map(p => p.id === planId ? { ...p, ...updates } : p));
                setSaved(false);
            };

            const addPlan = () => {
                const newPlan = {
                    id: 'plan_' + Date.now(),
                    name: 'Nuovo piano',
                    color: Object.keys(PLAN_COLORS).find(c => !localPlans.some(p => p.color === c)) || 'emerald',
                    categories: [],
                    conflicts: [],
                    isFreeTrack: false
                };
                setLocalPlans(prev => [...prev, newPlan]);
                setSaved(false);
            };

            const removePlan = (planId) => {
                if (localPlans.length <= 1) return;
                if (confirm('Rimuovere questo piano alimentare?')) {
                    setLocalPlans(prev => prev.filter(p => p.id !== planId));
                    setSaved(false);
                }
            };

            const addCategory = (planId) => {
                const plan = localPlans.find(p => p.id === planId);
                const nextId = String((plan.categories.length > 0 ? Math.max(...plan.categories.map(c => parseInt(c.id) || 0)) : 0) + 1);
                updatePlan(planId, {
                    categories: [...plan.categories, { id: nextId, label: '', guideline: '', target: 1 }]
                });
            };

            const updateCategory = (planId, catId, field, value) => {
                const plan = localPlans.find(p => p.id === planId);
                updatePlan(planId, {
                    categories: plan.categories.map(c => c.id === catId ? { ...c, [field]: value } : c)
                });
            };

            const removeCategory = (planId, catId) => {
                const plan = localPlans.find(p => p.id === planId);
                updatePlan(planId, {
                    categories: plan.categories.filter(c => c.id !== catId),
                    conflicts: plan.conflicts.filter(c => { const [a, b] = c.split(':'); return a !== catId && b !== catId; })
                });
            };

            const toggleConflict = (planId, catIdA, catIdB) => {
                const plan = localPlans.find(p => p.id === planId);
                const key1 = `${catIdA}:${catIdB}`;
                const key2 = `${catIdB}:${catIdA}`;
                const exists = plan.conflicts.some(c => c === key1 || c === key2);
                if (exists) {
                    updatePlan(planId, { conflicts: plan.conflicts.filter(c => c !== key1 && c !== key2) });
                } else {
                    updatePlan(planId, { conflicts: [...plan.conflicts, key1] });
                }
            };

            const handleSave = () => {
                onSavePlans(localPlans);
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            return (
                <div className="space-y-4 pb-20">
                    <div className="flex justify-between items-center">
                        <h2 className="text-lg font-bold text-slate-800">Piani alimentari</h2>
                        <button onClick={addPlan} className="text-xs bg-slate-800 text-white px-3 py-1.5 rounded-lg hover:bg-slate-700 font-bold">+ Aggiungi piano</button>
                    </div>
                    <p className="text-xs text-slate-500 -mt-2">Configura i piani alimentari per ogni membro della famiglia. Ogni piano ha le sue categorie di pasto, target settimanali e linee guida nutrizionali.</p>

                    {localPlans.map((plan, planIdx) => {
                        const colors = PLAN_COLORS[plan.color] || PLAN_COLORS.blue;
                        return (
                            <Card key={plan.id} className={`p-4 border-l-4 ${colors.border}`}>
                                <div className="flex justify-between items-start mb-3">
                                    <div className="flex-1 space-y-2">
                                        <div className="flex gap-2 items-center">
                                            <input type="text" className="text-sm font-bold border rounded px-2 py-1 flex-1" value={plan.name} onChange={(e) => updatePlan(plan.id, { name: e.target.value })} />
                                            <select className="text-xs border rounded px-1.5 py-1" value={plan.color} onChange={(e) => updatePlan(plan.id, { color: e.target.value })}>
                                                {Object.keys(PLAN_COLORS).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <label className="flex items-center gap-2 text-xs text-slate-600">
                                            <input type="checkbox" checked={plan.isFreeTrack || false} onChange={(e) => updatePlan(plan.id, { isFreeTrack: e.target.checked, categories: e.target.checked ? [] : plan.categories })} />
                                            Piano libero (senza vincoli - es. famiglia)
                                        </label>
                                    </div>
                                    {localPlans.length > 1 && (
                                        <button onClick={() => removePlan(plan.id)} className="text-xs text-red-500 hover:text-red-700 ml-2">Rimuovi</button>
                                    )}
                                </div>

                                {!plan.isFreeTrack && (
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs font-bold text-slate-600">Categorie pasto</span>
                                            <button onClick={() => addCategory(plan.id)} className="text-xs text-slate-600 border border-slate-300 px-2 py-0.5 rounded hover:bg-slate-50">+ Categoria</button>
                                        </div>

                                        {plan.categories.length === 0 && (
                                            <p className="text-xs text-slate-400 text-center py-3">Nessuna categoria. Aggiungi le categorie di pasto per questo piano.</p>
                                        )}

                                        {plan.categories.map((cat, catIdx) => (
                                            <div key={cat.id} className="bg-slate-50 border border-slate-200 rounded-lg p-2.5 space-y-1.5">
                                                <div className="flex gap-2 items-center">
                                                    <span className="text-xs font-bold text-slate-400 w-6">{cat.id}</span>
                                                    <input type="text" className="flex-1 text-sm border rounded px-2 py-1 bg-white" placeholder="Nome categoria (es: Carne)" value={cat.label} onChange={(e) => updateCategory(plan.id, cat.id, 'label', e.target.value)} />
                                                    <div className="flex items-center gap-1">
                                                        <span className="text-xs text-slate-500">x</span>
                                                        <input type="number" min="0" max="14" className="w-12 text-center text-sm border rounded py-1 bg-white" value={cat.target} onChange={(e) => updateCategory(plan.id, cat.id, 'target', parseInt(e.target.value) || 0)} />
                                                        <span className="text-xs text-slate-500">/sett</span>
                                                    </div>
                                                    <button onClick={() => removeCategory(plan.id, cat.id)} className="text-xs text-red-400 hover:text-red-600">x</button>
                                                </div>
                                                <input type="text" className="w-full text-xs border rounded px-2 py-1 bg-white text-slate-600" placeholder="Linea guida (es: 200g carne + 200g verdure + 40g riso)" value={cat.guideline} onChange={(e) => updateCategory(plan.id, cat.id, 'guideline', e.target.value)} />
                                            </div>
                                        ))}

                                        {/* Conflitti */}
                                        {plan.categories.length >= 2 && (
                                            <div>
                                                <span className="text-xs font-bold text-slate-600 block mb-1">Conflitti giornalieri (non nello stesso giorno)</span>
                                                <div className="flex flex-wrap gap-1.5">
                                                    {plan.categories.map((a, i) =>
                                                        plan.categories.slice(i + 1).map(b => {
                                                            const active = plan.conflicts.some(c => c === `${a.id}:${b.id}` || c === `${b.id}:${a.id}`);
                                                            return (
                                                                <button key={`${a.id}-${b.id}`} onClick={() => toggleConflict(plan.id, a.id, b.id)}
                                                                    className={`text-xs px-2 py-1 rounded-full border font-medium transition-all ${active ? 'bg-red-100 text-red-700 border-red-300' : 'bg-white text-slate-500 border-slate-200 hover:border-red-200'}`}>
                                                                    {a.label || a.id} + {b.label || b.id}
                                                                </button>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </Card>
                        );
                    })}

                    <button onClick={handleSave} className={`w-full text-white text-sm font-bold py-2.5 rounded-lg transition-all ${saved ? 'bg-emerald-500' : 'bg-slate-800 hover:bg-slate-700'}`}>
                        {saved ? 'Salvato!' : 'Salva piani alimentari'}
                    </button>

                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Gestione dati</h3>
                        <button onClick={resetData} className="text-sm text-red-600 border border-red-200 px-4 py-2 rounded-lg hover:bg-red-50 font-medium">
                            Reset database predefinito
                        </button>
                        <p className="text-xs text-slate-400 mt-2">Cancella tutte le modifiche e ripristina ricette e piani di default.</p>
                    </Card>
                </div>
            );
        };

        // --- SEZIONE SVILUPPO ---
        const SviluppoView = () => {
            const APP_VERSION = "3.0.0";
            const LAST_UPDATE = "Aprile 2026";

            const features = [
                { status: 'done', label: 'Pianificazione settimanale pranzo/cena', desc: 'Piano per 7 giorni con doppio binario dieta + famiglia' },
                { status: 'done', label: 'Database ricette con CRUD', desc: 'Creazione, modifica, eliminazione ricette con ingredienti e grammature' },
                { status: 'done', label: 'Lista spesa automatica', desc: 'Generazione ingredienti aggregati con checkbox per settimana' },
                { status: 'done', label: 'Categorie lista spesa', desc: 'Raggruppamento per reparto: verdura, carne, pesce, dispensa...' },
                { status: 'done', label: 'Validazione dietetica', desc: 'Conteggio tipi pasto settimanali con obiettivi e conflitti' },
                { status: 'done', label: 'Generazione ricette con AI', desc: 'Claude AI con profilo famiglia personalizzato, da ingredienti o per completare il piano' },
                { status: 'done', label: 'Sync cloud real-time', desc: 'Firebase Firestore con debounce intelligente e stato di sincronizzazione' },
                { status: 'done', label: 'Import/Export CSV', desc: 'Backup e ripristino del database ricette' },
                { status: 'done', label: 'Stampa menu settimanale', desc: 'Layout ottimizzato per stampa A4 con ingredienti e note' },
                { status: 'done', label: 'Note per pasto', desc: 'Campo note libero per ogni slot del piano' },
                { status: 'done', label: 'PWA installabile', desc: 'Service worker per cache, installabile su mobile come app nativa' },
                { status: 'done', label: 'Accessibilita base', desc: 'ARIA labels, navigazione semantica, focus trap modal, reduced motion' },
                { status: 'done', label: 'Piani alimentari multipli configurabili', desc: 'Ogni membro della famiglia puo\' avere il proprio piano con categorie, target e conflitti personalizzati' },
                { status: 'done', label: 'Metodi di cottura preferiti', desc: 'Selezione metodi cottura nel generatore AI per ricette piu\' mirate' },
            ];

            const roadmap = [
                { priority: 'alta', label: 'Autenticazione Firebase', desc: 'Login per proteggere i dati della famiglia con accesso sicuro' },
                { priority: 'alta', label: 'AI: suggerimento automatico piano completo', desc: 'Genera un intero piano settimanale rispettando vincoli dietetici e preferenze' },
                { priority: 'media', label: 'Offline mode completo', desc: 'Coda di modifiche offline con sync automatica al ritorno della connessione' },
                { priority: 'media', label: 'Drag & drop piano', desc: 'Riorganizzare i pasti trascinando le ricette tra gli slot' },
                { priority: 'media', label: 'Storico settimane', desc: 'Visualizzare e confrontare piani delle settimane passate' },
                { priority: 'media', label: 'AI: categorizzazione automatica ingredienti', desc: 'L\'AI assegna automaticamente la categoria a ingredienti nuovi' },
                { priority: 'bassa', label: 'Notifiche push', desc: 'Promemoria per la preparazione pasti e la spesa' },
                { priority: 'bassa', label: 'Multi-famiglia', desc: 'Supporto per piu famiglie/utenti con dati separati' },
                { priority: 'bassa', label: 'Tema scuro', desc: 'Dark mode per uso serale' },
            ];

            const statusIcon = { done: '✅', wip: '🔧' };
            const priorityColors = { alta: 'bg-red-100 text-red-800', media: 'bg-amber-100 text-amber-800', bassa: 'bg-slate-100 text-slate-600' };

            return (
                <div className="space-y-6 pb-20">
                    <div className="text-center">
                        <h2 className="text-2xl font-bold text-slate-800">Pianificatore Pasti</h2>
                        <p className="text-slate-400 text-sm mt-1">v{APP_VERSION} · Ultimo aggiornamento: {LAST_UPDATE}</p>
                    </div>

                    {/* Descrizione progetto */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-2">Il Progetto</h3>
                        <p className="text-sm text-slate-600 leading-relaxed">
                            Un'app pensata per famiglie che vogliono seguire un piano alimentare sano senza impazzire nell'organizzazione.
                            L'obiettivo e rendere <strong>pratico e veloce</strong> pianificare i pasti settimanali, ottimizzare la spesa,
                            e adattare le routine alimentari familiari con il supporto dell'intelligenza artificiale.
                        </p>
                        <p className="text-sm text-slate-600 leading-relaxed mt-2">
                            Ideale per <strong>famiglie numerose</strong> dove il tempo e prezioso: doppio binario dieta personale + famiglia,
                            lista spesa automatica per reparto, e generazione ricette AI che tiene conto delle preferenze di tutti.
                        </p>
                    </Card>

                    {/* Tech stack */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-2">Tecnologie</h3>
                        <div className="flex flex-wrap gap-2">
                            {['React 18', 'Firebase Firestore', 'Tailwind CSS', 'Claude AI (Anthropic)', 'Netlify Functions', 'PWA'].map(t => (
                                <span key={t} className="text-xs bg-slate-100 text-slate-700 px-2 py-1 rounded-full font-medium">{t}</span>
                            ))}
                        </div>
                    </Card>

                    {/* Feature completate */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Funzionalita ({features.length})</h3>
                        <div className="space-y-2">
                            {features.map((f, i) => (
                                <div key={i} className="flex gap-2 items-start">
                                    <span className="shrink-0 mt-0.5">{statusIcon[f.status]}</span>
                                    <div>
                                        <div className="text-sm font-bold text-slate-700">{f.label}</div>
                                        <div className="text-xs text-slate-400">{f.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>

                    {/* Roadmap */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Roadmap</h3>
                        <div className="space-y-2">
                            {roadmap.map((r, i) => (
                                <div key={i} className="flex gap-2 items-start">
                                    <span className={`text-xs px-2 py-0.5 rounded-full font-bold shrink-0 mt-0.5 ${priorityColors[r.priority]}`}>{r.priority}</span>
                                    <div>
                                        <div className="text-sm font-bold text-slate-700">{r.label}</div>
                                        <div className="text-xs text-slate-400">{r.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>

                    <div className="text-center text-xs text-slate-400 space-y-1">
                        <p>Sviluppato con Claude Code (Anthropic)</p>
                        <p>Repo: github.com/lcumrg/PianificatorePasti</p>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('plan');
            const [syncStatus, setSyncStatus] = useState('loading');
            const [syncError, setSyncError] = useState(null);
            const [lastSaveTime, setLastSaveTime] = useState(null);

            const [recipes, setRecipes] = useState(DEFAULT_RECIPES);
            const [checkedItems, setCheckedItems] = useState({});
            const [dietPlans, setDietPlans] = useState(DEFAULT_DIET_PLANS);

            const [currentWeekStart, setCurrentWeekStart] = useState(getMonday(new Date()));
            const [weeklyPlans, setWeeklyPlans] = useState({});
            const currentWeekKey = formatDateKey(currentWeekStart);
            const plan = weeklyPlans[currentWeekKey] || DEFAULT_PLAN;

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);

            // --- AI GENERATOR ---
            const [isAIModalOpen, setIsAIModalOpen] = useState(false);
            const openAIModal = () => setIsAIModalOpen(true);

            // Aggiorna variabili globali derivate quando dietPlans cambia
            useEffect(() => {
                MEAL_TYPES = getAllMealTypes(dietPlans);
                DIET_GUIDELINES = getDietGuidelines(dietPlans);
            }, [dietPlans]);


            const saveDietPlans = (plans) => {
                setDietPlans(plans);
                saveToCloud({ dietPlans: plans });
            };

            const addGeneratedRecipes = (newRecipes) => {
                const updated = [...recipes, ...newRecipes.map(r => ({ ...r, id: Date.now() + Math.random() }))];
                setRecipes(updated);
                saveToCloud({ recipes: updated });
            };

            // --- DEBOUNCE SYSTEM ---
            const debounceTimerRef = useRef(null);
            const pendingDataRef = useRef(null);

            const saveToCloudImmediate = (dataToUpdate) => {
                if(!db) return;
                if (debounceTimerRef.current) {
                    clearTimeout(debounceTimerRef.current);
                    debounceTimerRef.current = null;
                }
                pendingDataRef.current = null;
                setSyncStatus('sync');
                const fullData = { recipes, checkedItems, weeklyPlans, dietPlans, lastUpdate: new Date().toISOString(), ...dataToUpdate };
                db.collection('app_pasti').doc(DOC_ID).set(fullData)
                    .then(() => setTimeout(() => setSyncStatus('saved'), 500))
                    .catch((err) => { console.error(err); setSyncStatus('error'); });
            };

            const saveToCloudDebounced = (dataToUpdate) => {
                if(!db) return;
                pendingDataRef.current = { ...(pendingDataRef.current || {}), ...dataToUpdate };
                setSyncStatus('pending');
                if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
                debounceTimerRef.current = setTimeout(() => {
                    const dataToSave = pendingDataRef.current;
                    pendingDataRef.current = null;
                    debounceTimerRef.current = null;
                    saveToCloudImmediate(dataToSave);
                }, 1500);
            };

            // Flush salvataggio pendente alla chiusura pagina
            useEffect(() => {
                const handleBeforeUnload = () => {
                    if (pendingDataRef.current && db) {
                        const fullData = { recipes, checkedItems, weeklyPlans, dietPlans, lastUpdate: new Date().toISOString(), ...pendingDataRef.current };
                        navigator.sendBeacon && db.collection('app_pasti').doc(DOC_ID).set(fullData);
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            });

            // Alias per compatibilità - operazioni "pesanti" usano immediate
            const saveToCloud = saveToCloudImmediate;

            useEffect(() => {
                if(!db) return;
                const unsubscribe = db.collection('app_pasti').doc(DOC_ID)
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            const loadedRecipes = data.recipes || DEFAULT_RECIPES;
                            setRecipes(loadedRecipes);

                            // Carica piani alimentari configurati
                            const loadedDietPlans = data.dietPlans || DEFAULT_DIET_PLANS;
                            setDietPlans(loadedDietPlans);

                            if (data.checkedItems) {
                                const ci = data.checkedItems;
                                const keys = Object.keys(ci);
                                const isOldFormat = keys.length > 0 && typeof ci[keys[0]] === 'boolean';
                                if (isOldFormat) {
                                    const migrated = { [currentWeekKey]: ci };
                                    setCheckedItems(migrated);
                                    saveToCloudImmediate({ checkedItems: migrated });
                                } else {
                                    setCheckedItems(ci);
                                }
                            }

                            // Carica piani settimanali e migra formati vecchi
                            if (data.weeklyPlans) {
                                let plans = data.weeklyPlans;
                                let needsSave = false;
                                const migratedPlans = {};
                                Object.keys(plans).forEach(key => {
                                    let weekPlan = plans[key];
                                    // Migra da nome ricetta a ID
                                    const { migrated: idMigrated, changed } = migratePlanToIds(weekPlan, loadedRecipes);
                                    weekPlan = idMigrated;
                                    if (changed) needsSave = true;
                                    // Migra da vecchio formato (myRecipe/famRecipe) a tracks
                                    const trackMigrated = weekPlan.map(slot => migrateSlotToTracks(slot, loadedDietPlans));
                                    if (trackMigrated.some((s, i) => s !== weekPlan[i])) needsSave = true;
                                    migratedPlans[key] = trackMigrated;
                                });
                                setWeeklyPlans(migratedPlans);
                                if (needsSave) saveToCloudImmediate({ weeklyPlans: migratedPlans, recipes: loadedRecipes, dietPlans: loadedDietPlans });
                            } else if (data.plan) {
                                const { migrated } = migratePlanToIds(data.plan, loadedRecipes);
                                const trackMigrated = migrated.map(slot => migrateSlotToTracks(slot, loadedDietPlans));
                                setWeeklyPlans({ [currentWeekKey]: trackMigrated });
                            }

                            if (data.lastUpdate) {
                                const date = new Date(data.lastUpdate);
                                setLastSaveTime(date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                            }
                            setSyncStatus('saved');
                        } else {
                            const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                            saveToCloudImmediate({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {}, dietPlans: DEFAULT_DIET_PLANS });
                        }
                    }, (error) => {
                        console.error("Errore Sync:", error);
                        setSyncStatus('error');
                        if (error.code === 'permission-denied') {
                            setSyncError('Permessi Firebase insufficienti. Aggiorna le regole di sicurezza nella console Firebase.');
                        }
                    });
                return () => unsubscribe();
            }, []);

            const changeWeek = (days) => {
                // Flush pendente prima di cambiare settimana
                if (pendingDataRef.current) {
                    saveToCloudImmediate(pendingDataRef.current);
                }
                const newDate = new Date(currentWeekStart);
                newDate.setDate(newDate.getDate() + days);
                setCurrentWeekStart(newDate);
            };

            const updatePlan = (index, trackId, field, value) => {
                const newPlan = plan.map((slot, i) => {
                    if (i !== index) return slot;
                    if (!trackId) {
                        // Campo a livello slot (es: note)
                        return { ...slot, [field]: value };
                    }
                    const tracks = { ...(slot.tracks || {}) };
                    const track = { ...(tracks[trackId] || { type: '', recipe: '', portions: 1 }) };
                    track[field] = value;
                    if (field === 'type') track.recipe = '';
                    tracks[trackId] = track;
                    return { ...slot, tracks };
                });
                const newWeeklyPlans = { ...weeklyPlans, [currentWeekKey]: newPlan };
                setWeeklyPlans(newWeeklyPlans);
                saveToCloudDebounced({ weeklyPlans: newWeeklyPlans });
            };

            // checkedItems ora è { weekKey: { itemName: bool } }
            const weekChecked = checkedItems[currentWeekKey] || {};

            const toggleCheck = (name) => {
                const newWeekChecked = { ...weekChecked, [name]: !weekChecked[name] };
                const newChecked = { ...checkedItems, [currentWeekKey]: newWeekChecked };
                setCheckedItems(newChecked);
                saveToCloudDebounced({ checkedItems: newChecked });
            };

            const handleEditRecipe = (recipeToEdit) => {
                setEditingRecipe(recipeToEdit);
                setIsModalOpen(true);
            };

            const handleAddRecipe = () => {
                setEditingRecipe(null); 
                setIsModalOpen(true);
            };

            const saveRecipeFromForm = (formData) => {
                let updatedRecipes;
                if (formData.id) updatedRecipes = recipes.map(r => r.id === formData.id ? formData : r);
                else updatedRecipes = [...recipes, { ...formData, id: Date.now() }];
                setRecipes(updatedRecipes);
                saveToCloud({ recipes: updatedRecipes });
                setIsModalOpen(false);
                setEditingRecipe(null);
            };

            const deleteRecipe = (id) => {
                if(confirm("Eliminare ricetta per tutti?")) {
                    const newRecipes = recipes.filter(r => r.id !== id);
