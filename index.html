                    setRecipes(newRecipes);
                    saveToCloud({ recipes: newRecipes });
                }
            };

            const resetData = () => {
                if(confirm("ATTENZIONE: Questo cancellerà le tue modifiche attuali e ripristinerà il database predefinito. Sei sicuro?")) {
                    const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                    saveToCloud({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {}, dietPlans: DEFAULT_DIET_PLANS });
                    alert("Database ripristinato!");
                }
            };

            // Funzione Esportazione CSV
            window.exportRecipesCSV = () => {
                const headers = ["ID", "Tipo", "Nome", "Ingredienti"];
                const rows = recipes.map(r => {
                    const ingStr = r.ingredients.map(i => `${i.name} ${i.qty}${i.unit}`).join('; ');
                    const safeName = `"${r.name.replace(/"/g, '""')}"`;
                    const safeIng = `"${ingStr.replace(/"/g, '""')}"`;
                    return [r.id, r.type, safeName, safeIng].join(',');
                });
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join('\n');
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `ricette_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Funzione Importazione CSV
            const handleImportRecipes = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!confirm("ATTENZIONE: L'importazione sovrascriverà le ricette attuali con quelle del file CSV. Vuoi continuare?")) {
                    e.target.value = null; // Reset input
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const csvText = event.target.result;
                        const lines = csvText.split('\n').filter(l => l.trim() !== '');
                        const newRecipes = [];

                        // Skip header (row 0)
                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i];
                            // Regex robusta per CSV che gestisce le virgole dentro le virgolette
                            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                            
                            // Ci aspettiamo almeno 4 colonne: ID, Tipo, Nome, Ingredienti
                            // Nota: la regex sopra potrebbe non catturare campi vuoti correttamente in tutti i casi edge, 
                            // ma funziona per il formato export generato.
                            // Un approccio più semplice per il nostro formato specifico:
                            // ID e Tipo sono numeri/semplici. Nome e Ingredienti sono virgolettati.
                            
                            // Usiamo una logica di split più manuale per sicurezza sui dati generati
                            // ID,Tipo,"Nome","Ing..."
                            const firstComma = line.indexOf(',');
                            const secondComma = line.indexOf(',', firstComma + 1);
                            const firstQuote = line.indexOf('"');
                            
                            if (firstComma === -1 || secondComma === -1) continue;

                            const id = parseInt(line.substring(0, firstComma));
                            const type = line.substring(firstComma + 1, secondComma);
                            
                            // Parsare Nome e Ingredienti (assumendo siano tra virgolette)
                            // Trova la parte dopo il secondo comma
                            const rest = line.substring(secondComma + 1).trim();
                            // Regex per estrarre due stringhe tra virgolette separate da virgola
                            const parts = rest.match(/"([^"]*)"\s*,\s*"([^"]*)"/);
                            
                            let name = "";
                            let ingStr = "";

                            if (parts && parts.length >= 3) {
                                name = parts[1].replace(/""/g, '"');
                                ingStr = parts[2].replace(/""/g, '"');
                            } else {
                                // Fallback se il formato non è standard (es. editato a mano senza quotes)
                                // Questo è rischioso, ma proviamo
                                const simpleParts = rest.split(',');
                                name = simpleParts[0];
                                ingStr = simpleParts.slice(1).join(',');
                            }

                            // Parsare ingredienti: "Pasta 80g; Pomodoro 100ml"
                            const ingredients = [];
                            if (ingStr) {
                                const ingItems = ingStr.split(';');
                                ingItems.forEach(item => {
                                    item = item.trim();
                                    // Regex: Nome QuantitàUnità (es. "Pasta 80g" o "Olio 10ml")
                                    // Cerca l'ultima parte numerica+testo
                                    const match = item.match(/^(.*)\s+(\d+(?:[.,]\d+)?)([a-zA-Z]+)$/);
                                    if (match) {
                                        ingredients.push({
                                            name: match[1].trim(),
                                            qty: parseFloat(match[2].replace(',', '.')),
                                            unit: match[3]
                                        });
                                    }
                                });
                            }

                            if (name) {
                                newRecipes.push({
                                    id: id || Date.now() + i, // Mantieni ID o genera nuovo
                                    type: type.toString(),
                                    name: name,
                                    ingredients: ingredients
                                });
                            }
                        }

                        if (newRecipes.length > 0) {
                            setRecipes(newRecipes);
                            saveToCloud({ recipes: newRecipes });
                            alert(`Importazione completata! Caricate ${newRecipes.length} ricette.`);
                        } else {
                            alert("Nessuna ricetta valida trovata nel file CSV.");
                        }

                    } catch (err) {
                        console.error("Errore importazione CSV:", err);
                        alert("Errore durante la lettura del file CSV.");
                    }
                    e.target.value = null; // Reset input
                };
                reader.readAsText(file);
            };

            const handlePrint = () => {
                const printArea = document.getElementById('print-area');
                const dates = getDatesOfWeek(currentWeekStart);
                const colWidth = Math.floor(90 / dietPlans.length);
                const printHTML = `
                    <div style="font-family: sans-serif; color: #333;">
                        <h1 style="text-align: center; margin-bottom: 20px;">Menu Settimanale: ${formatDateDisplay(currentWeekStart)}</h1>
                        <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                            <thead>
                                <tr style="background: #eee;">
                                    <th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: 10%;">Giorno</th>
                                    ${dietPlans.map(dp => `<th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: ${colWidth}%;">${escapeHtml(dp.name)}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${plan.map((slot, i) => {
                                    const date = dates[Math.floor(i/2)];
                                    const dateStr = date.toLocaleDateString('it-IT', {weekday:'short', day:'numeric'});
                                    const rowStyle = i % 2 === 0 ? 'border-top: 2px solid #aaa;' : 'border-bottom: 1px solid #ddd;';
                                    const mealLabel = slot.meal.toUpperCase();

                                    return `
                                        <tr style="${rowStyle}">
                                            <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                <strong>${i%2===0 ? escapeHtml(dateStr) : ''}</strong>
                                                <div style="font-size: 0.8em; color: #666; margin-top: 2px;">${escapeHtml(mealLabel)}</div>
                                            </td>
                                            ${dietPlans.map(dp => {
                                                const track = slot.tracks?.[dp.id] || {};
                                                const rec = getRecipeById(track.recipe, recipes);
                                                const recName = escapeHtml(rec ? rec.name : (track.recipe ? '[Rimossa]' : '-'));
                                                const ing = escapeHtml(getIngredientsSummary(track.recipe, track.portions, recipes));
                                                const typeLabel = !dp.isFreeTrack && track.type && track.type !== 'LIBERO' ? `<div style="font-size: 0.8em;">${escapeHtml(track.type)}</div>` : '';
                                                return `
                                                    <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                        <div style="font-weight: bold;">${recName}</div>
                                                        ${typeLabel}
                                                        ${ing ? `<div style="font-size: 0.8em; color: #555; margin-top: 2px; font-style: italic;">(${ing})</div>` : ''}
                                                    </td>
                                                `;
                                            }).join('')}
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                printArea.innerHTML = printHTML;
                window.print();
            };

            const shoppingList = useMemo(() => {
                const list = {};
                plan.forEach(slot => {
                    if (!slot.tracks) return;
                    Object.values(slot.tracks).forEach(track => {
                        const rec = getRecipeById(track.recipe, recipes);
                        if (rec) {
                            rec.ingredients.forEach(ing => {
                                const key = `${ing.name} (${ing.unit})`;
                                if (!list[key]) list[key] = { name: ing.name, unit: ing.unit, qty: 0 };
                                list[key].qty += ing.qty * (track.portions || 0);
                            });
                        }
                    });
                });
                return Object.values(list).sort((a, b) => a.name.localeCompare(b.name));
            }, [plan, recipes]);

            const handleCopy = () => {
                const text = shoppingList.map(item => `- ${item.name}: ${item.qty} ${item.unit}`).join('\n');
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); alert("Copiato!"); } catch (e) {}
                document.body.removeChild(ta);
            };

            if (syncStatus === 'loading' && !db) return <div className="flex h-screen items-center justify-center p-8 text-center text-slate-500">In attesa di connessione...<br/>Controlla la config.</div>;

            return (
                <div className="min-h-screen bg-slate-50 p-2 md:p-8 font-sans pb-24 md:pb-8">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <header className="flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Pianificatore Pasti</h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <div className={`w-2 h-2 rounded-full ${syncStatus === 'saved' ? 'bg-emerald-500' : syncStatus === 'error' ? 'bg-red-500' : syncStatus === 'pending' ? 'bg-amber-400' : 'bg-blue-500 animate-pulse'}`}></div>
                                        <p className="text-xs text-slate-500 font-medium">
                                            {syncStatus === 'saved' ? `Salvato alle ${lastSaveTime || '...'}` : syncStatus === 'pending' ? 'Modifiche in attesa...' : syncStatus === 'sync' ? 'Salvataggio...' : syncError || 'Errore Sync'}
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* NAVIGATION */}
                            <nav className="flex gap-2 border-t pt-2" role="tablist" aria-label="Navigazione principale">
                                <button role="tab" aria-selected={activeTab === 'plan'} onClick={() => setActiveTab('plan')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'plan' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.Calendar /> Planner
                                </button>
                                <button role="tab" aria-selected={activeTab === 'shop'} onClick={() => setActiveTab('shop')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'shop' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.ShoppingCart /> Spesa
                                </button>
                                <button role="tab" aria-selected={activeTab === 'recipes'} onClick={() => setActiveTab('recipes')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'recipes' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.BookOpen /> Ricette
                                </button>
                                <button role="tab" aria-selected={activeTab === 'settings'} onClick={() => setActiveTab('settings')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'settings' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.Settings /> Famiglia
                                </button>
                                <button role="tab" aria-selected={activeTab === 'dev'} onClick={() => setActiveTab('dev')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'dev' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.Code /> Sviluppo
                                </button>
                            </nav>
                        </header>
                        
                        <main className="animate-fade-in" role="tabpanel">
                            {activeTab === 'plan' && <PlannerView
                                plan={plan}
                                updatePlan={updatePlan}
                                recipes={recipes}
                                dietPlans={dietPlans}
                                currentWeek={currentWeekStart}
                                changeWeek={changeWeek}
                                resetData={resetData}
                                handlePrint={handlePrint}
                            />}
                            {activeTab === 'shop' && <ShoppingListView shoppingList={shoppingList} handleCopy={handleCopy} checkedItems={weekChecked} toggleCheck={toggleCheck} />}
                            {activeTab === 'recipes' &&
                                <RecipesView
                                    recipes={recipes}
                                    deleteRecipe={deleteRecipe}
                                    onAddRecipe={handleAddRecipe}
                                    onEditRecipe={handleEditRecipe}
                                    onImportRecipes={handleImportRecipes}
                                    openAIModal={openAIModal}
                                />
                            }
                            {activeTab === 'dev' && <SviluppoView />}
                            {activeTab === 'settings' && <SettingsView dietPlans={dietPlans} onSavePlans={saveDietPlans} resetData={resetData} />}
                        </main>
                    </div>
                    
                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingRecipe ? "Modifica Ricetta" : "Nuova Ricetta"}>
                        <RecipeForm
                            onSave={saveRecipeFromForm}
                            initialData={editingRecipe}
                        />
                    </Modal>

                    <AIRecipeGenerator
                        isOpen={isAIModalOpen}
                        onClose={() => setIsAIModalOpen(false)}
                        recipes={recipes}
                        onAddRecipes={addGeneratedRecipes}
                        dietPlans={dietPlans}
                        onOpenSettings={() => setActiveTab('settings')}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
