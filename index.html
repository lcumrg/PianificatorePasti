                const dinner = plan[i+1];
                const t1 = lunch.type.split(' ')[0];
                const t2 = dinner.type.split(' ')[0];

                if (counts[t1] !== undefined) counts[t1]++;
                if (counts[t2] !== undefined) counts[t2]++;

                if ((t1 === '2' && t2 === '4') || (t1 === '4' && t2 === '2')) {
                    conflicts.push(lunch.day);
                }
            }

            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2">
                        <Icons.Check /> Controllo Dieta
                    </h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        {Object.entries(DIET_TARGETS).map(([key, data]) => {
                            const count = counts[key];
                            const isExact = count === data.target;
                            const isOver = count > data.target;
                            const statusColor = isExact ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 
                                              isOver ? 'bg-red-100 text-red-800 border-red-200' : 
                                              'bg-slate-100 text-slate-600 border-slate-200';
                            return (
                                <div key={key} className={`border rounded-lg p-2 flex flex-col items-center ${statusColor}`}>
                                    <span className="text-xs font-bold uppercase">{data.label}</span>
                                    <span className="text-lg font-black">{count}/{data.target}</span>
                                </div>
                            );
                        })}
                    </div>
                    {conflicts.length > 0 && (
                        <div className="bg-red-50 border border-red-200 rounded-lg p-3 flex items-start gap-3">
                            <div className="text-red-500 mt-1"><Icons.Alert /></div>
                            <div>
                                <strong className="text-red-800 text-sm block">Conflitto Carne/Pesce rilevato!</strong>
                                <p className="text-red-600 text-xs">Non puoi mangiare carne e pesce lo stesso giorno: {conflicts.join(', ')}.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- HELPERS DATE ---
        const getMonday = (d) => {
            d = new Date(d);
            const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); 
            return new Date(d.setDate(diff));
        }
        const formatDateKey = (date) => date.toISOString().split('T')[0];
        const formatDateDisplay = (dateStr) => new Date(dateStr).toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
        const getDatesOfWeek = (start) => Array.from({length: 7}, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });

        // --- HELPERS STAMPA ---
        // Sanitizza stringa per inserimento in HTML (previene XSS)
        const escapeHtml = (str) => {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        };

        // Risolve ricetta per ID (o per nome per retrocompatibilità)
        const getRecipeById = (recipeId, recipes) => {
            if (!recipeId) return null;
            if (typeof recipeId === 'number') return recipes.find(r => r.id === recipeId) || null;
            return recipes.find(r => r.name === recipeId) || null; // fallback nome per dati vecchi
        };

        const getIngredientsSummary = (recipeId, portions, recipes) => {
            if (!recipeId || portions <= 0) return null;
            const rec = getRecipeById(recipeId, recipes);
            if (!rec) return null;
            return rec.ingredients.map(ing => `${ing.name}: ${ing.qty * portions}${ing.unit}`).join(', ');
        };

        // Migra piano da formato nome (vecchio) a formato ID (nuovo)
        const migratePlanToIds = (plan, recipes) => {
            let changed = false;
            const migrated = plan.map(slot => {
                const s = { ...slot };
                if (typeof s.myRecipe === 'string' && s.myRecipe !== '') {
                    const found = recipes.find(r => r.name === s.myRecipe);
                    s.myRecipe = found ? found.id : '';
                    changed = true;
                }
                if (typeof s.famRecipe === 'string' && s.famRecipe !== '') {
                    const found = recipes.find(r => r.name === s.famRecipe);
                    s.famRecipe = found ? found.id : '';
                    changed = true;
                }
                return s;
            });
            return { migrated, changed };
        };

        // --- COMPONENTI UI ---
        const Card = ({ children, className = "" }) => <div className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${className}`}>{children}</div>;
        const Modal = ({ isOpen, onClose, title, children }) => {
            const modalRef = useRef(null);

            useEffect(() => {
                if (!isOpen) return;
                const handleKeyDown = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handleKeyDown);
                // Focus trap: focus first focusable element
                setTimeout(() => {
                    const el = modalRef.current?.querySelector('button, input, select, textarea');
                    if (el) el.focus();
                }, 50);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, [isOpen]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 animate-fade-in" role="dialog" aria-modal="true" aria-label={title} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div ref={modalRef} className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] flex flex-col">
                        <div className="flex justify-between items-center p-4 border-b">
                            <h3 className="font-bold text-lg">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full" aria-label="Chiudi"><Icons.X /></button>
                        </div>
                        <div className="p-4 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- FORM RICETTA ---
        const RecipeForm = ({ onSave, initialData }) => {
            const [recipeData, setRecipeData] = useState(initialData || { name: '', type: '1', ingredients: [] });
            const [tempIng, setTempIng] = useState({ name: '', qty: '', unit: 'g' });

            useEffect(() => {
                setRecipeData(initialData || { name: '', type: '1', ingredients: [] });
                setTempIng({ name: '', qty: '', unit: 'g' });
            }, [initialData]);

            const addIngredient = () => {
                if (!tempIng.name || !tempIng.qty) return;
                const qtyNum = parseFloat(tempIng.qty.toString().replace(',', '.'));
                if (isNaN(qtyNum)) return;
                setRecipeData(prev => ({ ...prev, ingredients: [...prev.ingredients, { ...tempIng, qty: qtyNum }] }));
                setTempIng({ name: '', qty: '', unit: 'g' });
            };

            const handleSave = () => {
                if (!recipeData.name) { alert("Nome ricetta obbligatorio"); return; }
                let finalIngredients = [...recipeData.ingredients];
                if (tempIng.name && tempIng.qty) {
                     const qtyNum = parseFloat(tempIng.qty.toString().replace(',', '.'));
                     if (!isNaN(qtyNum)) finalIngredients.push({ ...tempIng, qty: qtyNum });
                }
                onSave({ ...recipeData, ingredients: finalIngredients });
            };

            const guideline = DIET_GUIDELINES[recipeData.type];

            return (
                <div className="space-y-4 flex flex-col h-full">
                    <div className="flex-1 space-y-4">
                        <div>
                            <label className="block text-sm font-bold mb-1">Nome Piatto</label>
                            <input className="w-full border rounded p-2" value={recipeData.name} onChange={e => setRecipeData({...recipeData, name: e.target.value})} placeholder="Es. Pasta al Pomodoro" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold mb-1">Tipologia</label>
                            <select className="w-full border rounded p-2" value={recipeData.type} onChange={e => setRecipeData({...recipeData, type: e.target.value})}>
                                {MEAL_TYPES.map(t => <option key={t} value={t.split(' ')[0]}>{t}</option>)}
                            </select>
                        </div>

                        {guideline && (
                            <div className="bg-blue-50 border-l-4 border-blue-500 p-3 rounded text-xs text-blue-800 mb-2 flex gap-2">
                                <div className="mt-0.5"><Icons.Info /></div>
                                <div>
                                    <strong>Promemoria Dosi:</strong><br/>
                                    {guideline}
                                </div>
                            </div>
                        )}

                        <div className="bg-slate-50 p-3 rounded">
                            <h4 className="text-sm font-bold mb-2">Ingredienti</h4>
                            
                            <div className="flex flex-col gap-2 mb-3">
                                <input 
                                    className="w-full border rounded p-2 text-sm" 
                                    placeholder="Nome Ingrediente" 
                                    value={tempIng.name} 
                                    onChange={e => setTempIng({...tempIng, name: e.target.value})} 
                                />
                                <div className="flex gap-2">
                                    <input 
                                        className="w-24 border rounded p-2 text-sm" 
                                        type="text" 
                                        inputMode="decimal" 
                                        placeholder="Qtà" 
                                        value={tempIng.qty} 
                                        onChange={e => setTempIng({...tempIng, qty: e.target.value})} 
                                    />
                                    <select 
                                        className="w-20 border rounded text-sm bg-white" 
                                        value={tempIng.unit} 
                                        onChange={e => setTempIng({...tempIng, unit: e.target.value})}
                                    >
                                        <option value="g">g</option>
                                        <option value="ml">ml</option>
                                        <option value="pz">pz</option>
                                        <option value="qb">qb</option>
                                    </select>
                                    <button 
                                        onClick={addIngredient} 
                                        className="flex-grow bg-emerald-600 text-white rounded-lg font-bold shadow-sm hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center"
                                        title="Aggiungi Ingrediente"
                                    >
                                        <span className="flex items-center gap-1">
                                            <Icons.Plus /> 
                                            <span className="text-sm">Aggiungi</span>
                                        </span>
                                    </button>
                                </div>
                            </div>
                            
                            <ul className="text-sm space-y-1 mt-3">
                                {recipeData.ingredients.map((ing, idx) => (
                                    <li key={idx} className="flex justify-between bg-white p-2 rounded border border-slate-100 items-center shadow-sm">
                                        <span>{ing.name} ({ing.qty}{ing.unit})</span>
                                        <button onClick={() => setRecipeData(p => ({...p, ingredients: p.ingredients.filter((_,i)=>i!==idx)}))} className="text-red-500 font-bold px-2 hover:bg-red-50 rounded">x</button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                    <div className="pt-4 mt-auto border-t border-slate-100 sticky bottom-0 bg-white">
                        <button onClick={handleSave} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-md active:translate-y-0.5 transition-all">{initialData ? "Salva Modifiche" : "Crea Ricetta"}</button>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE AI RECIPE GENERATOR ---
        const AIRecipeGenerator = ({ isOpen, onClose, mode: initialMode, plan, recipes, onAddRecipes, mealTypes, familyPrefs, onSavePrefs }) => {
            const [activeMode, setActiveMode] = useState(initialMode || 'from_ingredients');
            const [showPrefs, setShowPrefs] = useState(false);
            const [ingredientsText, setIngredientsText] = useState('');
            const [recipeType, setRecipeType] = useState('');
            const [maxTime, setMaxTime] = useState('');
            const [contextText, setContextText] = useState('');
            const [generatedRecipes, setGeneratedRecipes] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // Preferenze famiglia locali (editabili nel form)
            const [localPrefs, setLocalPrefs] = useState(familyPrefs || {});
            useEffect(() => { setLocalPrefs(familyPrefs || {}); }, [familyPrefs]);

            useEffect(() => { if (initialMode) setActiveMode(initialMode); }, [initialMode]);
            useEffect(() => { if (!isOpen) { setGeneratedRecipes([]); setError(null); setLoading(false); } }, [isOpen]);

            const emptySlots = useMemo(() => {
                if (!plan) return [];
                return plan.map((slot, idx) => ({ ...slot, index: idx }))
                    .filter(s => !s.myRecipe && s.type !== 'LIBERO' && s.type !== 'F (Famiglia)');
            }, [plan]);

            const handleSavePrefs = () => {
                onSavePrefs(localPrefs);
                setShowPrefs(false);
            };

            const handleGenerate = async () => {
                setLoading(true);
                setError(null);
                setGeneratedRecipes([]);

                const baseBody = {
                    familyPrefs: localPrefs,
                    context: contextText || undefined,
                };

                const body = activeMode === 'from_ingredients'
                    ? { ...baseBody, mode: 'from_ingredients', ingredients: ingredientsText, recipeType: recipeType || undefined, maxTime: maxTime || undefined }
                    : {
                        ...baseBody,
                        mode: 'from_plan',
                        planSlots: emptySlots.map(s => ({ day: s.day, meal: s.meal, type: s.type.split(' ')[0] })),
                        existingRecipeNames: recipes.map(r => r.name)
                    };

                try {
                    const resp = await fetch('/.netlify/functions/generate-recipe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Errore nella generazione');
                    setGeneratedRecipes(data.recipes || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const addRecipe = (recipe) => {
                const { prepTime, tip, ...recipeData } = recipe;
                onAddRecipes([recipeData]);
                setGeneratedRecipes(prev => prev.filter(r => r.name !== recipe.name));
            };

            const addAll = () => {
                onAddRecipes(generatedRecipes.map(({ prepTime, tip, ...r }) => r));
                setGeneratedRecipes([]);
            };

            if (!isOpen) return null;

            const typeLabels = { '1': 'Pasta/Riso', '2': 'Carne', '3': 'Legumi', '4': 'Pesce', 'F': 'Famiglia' };
            const hasPrefs = localPrefs.familySize || localPrefs.restrictions || localPrefs.kidsPrefs;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Genera Ricette con AI">
                    <div className="space-y-4">
                        {/* Profilo famiglia collapsible */}
                        <div className="border border-violet-200 rounded-lg overflow-hidden">
                            <button onClick={() => setShowPrefs(!showPrefs)} className="w-full flex justify-between items-center px-3 py-2 bg-violet-50 text-sm font-bold text-violet-800 hover:bg-violet-100">
                                <span>Profilo Famiglia {hasPrefs ? '(configurato)' : '(configura per risultati migliori)'}</span>
                                <span className="text-xs">{showPrefs ? '▲' : '▼'}</span>
                            </button>
                            {showPrefs && (
                                <div className="p-3 space-y-2 bg-white">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-0.5">Componenti famiglia</label>
                                            <input type="number" min="1" max="12" className="w-full border rounded p-1.5 text-sm" placeholder="Es: 4" value={localPrefs.familySize || ''} onChange={(e) => setLocalPrefs({...localPrefs, familySize: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-0.5">Tempo cottura max</label>
                                            <select className="w-full border rounded p-1.5 text-sm" value={localPrefs.maxPrepTime || ''} onChange={(e) => setLocalPrefs({...localPrefs, maxPrepTime: e.target.value})}>
                                                <option value="">Qualsiasi</option>
                                                <option value="15">15 min (super veloce)</option>
                                                <option value="30">30 min (veloce)</option>
                                                <option value="45">45 min (medio)</option>
                                                <option value="60">1 ora+</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">Allergie / Restrizioni</label>
                                        <input type="text" className="w-full border rounded p-1.5 text-sm" placeholder="Es: no glutine, no lattosio..." value={localPrefs.restrictions || ''} onChange={(e) => setLocalPrefs({...localPrefs, restrictions: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">I bambini non mangiano / preferenze kids</label>
                                        <input type="text" className="w-full border rounded p-1.5 text-sm" placeholder="Es: niente funghi, solo pasta in bianco..." value={localPrefs.kidsPrefs || ''} onChange={(e) => setLocalPrefs({...localPrefs, kidsPrefs: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">Stile cucina preferito</label>
                                        <input type="text" className="w-full border rounded p-1.5 text-sm" placeholder="Es: mediterranea, semplice, pochi ingredienti..." value={localPrefs.cuisinePrefs || ''} onChange={(e) => setLocalPrefs({...localPrefs, cuisinePrefs: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">Note generali</label>
                                        <input type="text" className="w-full border rounded p-1.5 text-sm" placeholder="Es: cucino batch la domenica, no forno..." value={localPrefs.notes || ''} onChange={(e) => setLocalPrefs({...localPrefs, notes: e.target.value})} />
                                    </div>
                                    <button onClick={handleSavePrefs} className="w-full bg-violet-600 text-white text-sm font-bold py-2 rounded-lg hover:bg-violet-700">Salva Profilo</button>
                                </div>
                            )}
                        </div>

                        {/* Tab switcher */}
                        <div className="flex gap-2 bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setActiveMode('from_ingredients')}
                                className={`flex-1 py-2 rounded-md text-sm font-bold transition-all ${activeMode === 'from_ingredients' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>
                                Da Ingredienti
                            </button>
                            <button onClick={() => setActiveMode('from_plan')}
                                className={`flex-1 py-2 rounded-md text-sm font-bold transition-all ${activeMode === 'from_plan' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>
                                Completa Piano
                            </button>
                        </div>

                        {/* Contenuto tab */}
                        {activeMode === 'from_ingredients' ? (
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-sm font-bold mb-1">Cosa hai in casa?</label>
                                    <textarea
                                        className="w-full border rounded-lg p-3 text-sm"
                                        rows="2"
                                        placeholder="Es: petto di pollo, zucchine, riso, pomodorini, parmigiano..."
                                        value={ingredientsText}
                                        onChange={(e) => setIngredientsText(e.target.value)}
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">Tipo (opzionale)</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={recipeType} onChange={(e) => setRecipeType(e.target.value)}>
                                            <option value="">Qualsiasi</option>
                                            {mealTypes.filter(t => t !== 'LIBERO').map(t => <option key={t} value={t.split(' ')[0]}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-600 mb-0.5">Tempo max</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={maxTime} onChange={(e) => setMaxTime(e.target.value)}>
                                            <option value="">Qualsiasi</option>
                                            <option value="15">15 min</option>
                                            <option value="30">30 min</option>
                                            <option value="45">45 min</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {emptySlots.length === 0 ? (
                                    <div className="text-center text-slate-400 py-4">Tutti gli slot del piano hanno gia una ricetta assegnata.</div>
                                ) : (
                                    <div>
                                        <p className="text-sm text-slate-600 mb-2"><strong>{emptySlots.length}</strong> slot da completare:</p>
                                        <div className="space-y-1 max-h-32 overflow-y-auto">
                                            {emptySlots.map((s, i) => (
                                                <div key={i} className="flex items-center gap-2 text-sm bg-slate-50 px-3 py-1.5 rounded">
                                                    <span className="font-bold text-slate-700">{s.day}</span>
                                                    <span className="text-slate-400">{s.meal}</span>
                                                    <span className="ml-auto text-xs bg-slate-200 px-2 py-0.5 rounded-full font-medium">{s.type}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Contesto / note per questa richiesta */}
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-0.5">Indicazioni per questa volta (opzionale)</label>
                            <input type="text" className="w-full border rounded p-2 text-sm" placeholder="Es: stasera ho poco tempo, preferisco qualcosa al forno, i bambini hanno amici a cena..." value={contextText} onChange={(e) => setContextText(e.target.value)} />
                        </div>

                        {/* Bottone genera */}
                        <button
                            onClick={handleGenerate}
                            disabled={loading || (activeMode === 'from_ingredients' && !ingredientsText.trim()) || (activeMode === 'from_plan' && emptySlots.length === 0)}
                            className="w-full bg-violet-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-0.5 transition-all flex items-center justify-center gap-2"
                        >
                            {loading ? (
                                <><svg className="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Generazione in corso...</>
                            ) : (
                                <><Icons.Sparkle /> Genera Ricette</>
                            )}
                        </button>

                        {/* Errore */}
                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm">{error}</div>
                        )}

                        {/* Risultati */}
                        {generatedRecipes.length > 0 && (
                            <div className="space-y-3 border-t pt-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800">Ricette Generate ({generatedRecipes.length})</h3>
                                    {generatedRecipes.length > 1 && (
                                        <button onClick={addAll} className="text-sm bg-emerald-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-emerald-700">
                                            Aggiungi Tutte
                                        </button>
                                    )}
                                </div>
                                {generatedRecipes.map((recipe, idx) => (
                                    <div key={idx} className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <span className="font-bold text-slate-800">{recipe.name}</span>
                                                <div className="flex gap-1 mt-1">
                                                    <span className="text-xs bg-slate-200 px-2 py-0.5 rounded-full">{typeLabels[recipe.type] || recipe.type}</span>
                                                    {recipe.prepTime && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">{recipe.prepTime} min</span>}
                                                </div>
                                            </div>
                                            <button onClick={() => addRecipe(recipe)} className="text-sm bg-emerald-600 text-white px-3 py-1 rounded-lg font-bold hover:bg-emerald-700 shrink-0">
                                                + Aggiungi
                                            </button>
                                        </div>
                                        <div className="text-xs text-slate-500">
                                            {recipe.ingredients.map((ing, j) => (

                    debounceTimerRef.current = null;
                }
                pendingDataRef.current = null;
                setSyncStatus('sync');
                const fullData = { recipes, checkedItems, weeklyPlans, lastUpdate: new Date().toISOString(), ...dataToUpdate };
                db.collection('app_pasti').doc(DOC_ID).set(fullData)
                    .then(() => setTimeout(() => setSyncStatus('saved'), 500))
                    .catch((err) => { console.error(err); setSyncStatus('error'); });
            };

            const saveToCloudDebounced = (dataToUpdate) => {
                if(!db) return;
                pendingDataRef.current = { ...(pendingDataRef.current || {}), ...dataToUpdate };
                setSyncStatus('pending');
                if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
                debounceTimerRef.current = setTimeout(() => {
                    const dataToSave = pendingDataRef.current;
                    pendingDataRef.current = null;
                    debounceTimerRef.current = null;
                    saveToCloudImmediate(dataToSave);
                }, 1500);
            };

            // Flush salvataggio pendente alla chiusura pagina
            useEffect(() => {
                const handleBeforeUnload = () => {
                    if (pendingDataRef.current && db) {
                        const fullData = { recipes, checkedItems, weeklyPlans, lastUpdate: new Date().toISOString(), ...pendingDataRef.current };
                        navigator.sendBeacon && db.collection('app_pasti').doc(DOC_ID).set(fullData);
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            });

            // Alias per compatibilità - operazioni "pesanti" usano immediate
            const saveToCloud = saveToCloudImmediate;

            useEffect(() => {
                if(!db) return;
                const unsubscribe = db.collection('app_pasti').doc(DOC_ID)
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            const loadedRecipes = data.recipes || DEFAULT_RECIPES;
                            setRecipes(loadedRecipes);
                            if (data.familyPrefs) setFamilyPrefs(data.familyPrefs);
                            if (data.checkedItems) {
                                // Migrazione: se il vecchio formato è { nome: bool } (flat), wrappa sotto weekKey
                                const ci = data.checkedItems;
                                const keys = Object.keys(ci);
                                const isOldFormat = keys.length > 0 && typeof ci[keys[0]] === 'boolean';
                                if (isOldFormat) {
                                    const migrated = { [currentWeekKey]: ci };
                                    setCheckedItems(migrated);
                                    saveToCloudImmediate({ checkedItems: migrated });
                                } else {
                                    setCheckedItems(ci);
                                }
                            }

                            // Carica piani e migra da formato nome a ID se necessario
                            if (data.weeklyPlans) {
                                let plans = data.weeklyPlans;
                                let needsSave = false;
                                const migratedPlans = {};
                                Object.keys(plans).forEach(key => {
                                    const { migrated, changed } = migratePlanToIds(plans[key], loadedRecipes);
                                    migratedPlans[key] = migrated;
                                    if (changed) needsSave = true;
                                });
                                setWeeklyPlans(migratedPlans);
                                if (needsSave) saveToCloudImmediate({ weeklyPlans: migratedPlans, recipes: loadedRecipes });
                            } else if (data.plan) {
                                const { migrated } = migratePlanToIds(data.plan, loadedRecipes);
                                setWeeklyPlans({ [currentWeekKey]: migrated });
                            }

                            if (data.lastUpdate) {
                                const date = new Date(data.lastUpdate);
                                setLastSaveTime(date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                            }
                            setSyncStatus('saved');
                        } else {
                            const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                            saveToCloudImmediate({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {} });
                        }
                    }, (error) => {
                        console.error("Errore Sync:", error);
                        setSyncStatus('error');
                        if (error.code === 'permission-denied') {
                            setSyncError('Permessi Firebase insufficienti. Aggiorna le regole di sicurezza nella console Firebase.');
                        }
                    });
                return () => unsubscribe();
            }, []);

            const changeWeek = (days) => {
                // Flush pendente prima di cambiare settimana
                if (pendingDataRef.current) {
                    saveToCloudImmediate(pendingDataRef.current);
                }
                const newDate = new Date(currentWeekStart);
                newDate.setDate(newDate.getDate() + days);
                setCurrentWeekStart(newDate);
            };

            const updatePlan = (index, field, value) => {
                const newPlan = [...plan];
                newPlan[index][field] = value;
                if (field === 'type') { newPlan[index].myRecipe = ""; }
                const newWeeklyPlans = { ...weeklyPlans, [currentWeekKey]: newPlan };
                setWeeklyPlans(newWeeklyPlans);
                saveToCloudDebounced({ weeklyPlans: newWeeklyPlans });
            };

            // checkedItems ora è { weekKey: { itemName: bool } }
            const weekChecked = checkedItems[currentWeekKey] || {};

            const toggleCheck = (name) => {
                const newWeekChecked = { ...weekChecked, [name]: !weekChecked[name] };
                const newChecked = { ...checkedItems, [currentWeekKey]: newWeekChecked };
                setCheckedItems(newChecked);
                saveToCloudDebounced({ checkedItems: newChecked });
            };

            const handleEditRecipe = (recipeToEdit) => {
                setEditingRecipe(recipeToEdit);
                setIsModalOpen(true);
            };

            const handleAddRecipe = () => {
                setEditingRecipe(null); 
                setIsModalOpen(true);
            };

            const saveRecipeFromForm = (formData) => {
                let updatedRecipes;
                if (formData.id) updatedRecipes = recipes.map(r => r.id === formData.id ? formData : r);
                else updatedRecipes = [...recipes, { ...formData, id: Date.now() }];
                setRecipes(updatedRecipes);
                saveToCloud({ recipes: updatedRecipes });
                setIsModalOpen(false);
                setEditingRecipe(null);
            };

            const deleteRecipe = (id) => {
                if(confirm("Eliminare ricetta per tutti?")) {
                    const newRecipes = recipes.filter(r => r.id !== id);
                    setRecipes(newRecipes);
                    saveToCloud({ recipes: newRecipes });
                }
            };

            const resetData = () => {
                if(confirm("ATTENZIONE: Questo cancellerà le tue modifiche attuali e ripristinerà il database predefinito. Sei sicuro?")) {
                    const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                    saveToCloud({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {} });
                    alert("Database ripristinato!");
                }
            };

            // Funzione Esportazione CSV
            window.exportRecipesCSV = () => {
                const headers = ["ID", "Tipo", "Nome", "Ingredienti"];
                const rows = recipes.map(r => {
                    const ingStr = r.ingredients.map(i => `${i.name} ${i.qty}${i.unit}`).join('; ');
                    const safeName = `"${r.name.replace(/"/g, '""')}"`;
                    const safeIng = `"${ingStr.replace(/"/g, '""')}"`;
                    return [r.id, r.type, safeName, safeIng].join(',');
                });
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join('\n');
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `ricette_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Funzione Importazione CSV
            const handleImportRecipes = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!confirm("ATTENZIONE: L'importazione sovrascriverà le ricette attuali con quelle del file CSV. Vuoi continuare?")) {
                    e.target.value = null; // Reset input
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const csvText = event.target.result;
                        const lines = csvText.split('\n').filter(l => l.trim() !== '');
                        const newRecipes = [];

                        // Skip header (row 0)
                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i];
                            // Regex robusta per CSV che gestisce le virgole dentro le virgolette
                            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                            
                            // Ci aspettiamo almeno 4 colonne: ID, Tipo, Nome, Ingredienti
                            // Nota: la regex sopra potrebbe non catturare campi vuoti correttamente in tutti i casi edge, 
                            // ma funziona per il formato export generato.
                            // Un approccio più semplice per il nostro formato specifico:
                            // ID e Tipo sono numeri/semplici. Nome e Ingredienti sono virgolettati.
                            
                            // Usiamo una logica di split più manuale per sicurezza sui dati generati
                            // ID,Tipo,"Nome","Ing..."
                            const firstComma = line.indexOf(',');
                            const secondComma = line.indexOf(',', firstComma + 1);
                            const firstQuote = line.indexOf('"');
                            
                            if (firstComma === -1 || secondComma === -1) continue;

                            const id = parseInt(line.substring(0, firstComma));
                            const type = line.substring(firstComma + 1, secondComma);
                            
                            // Parsare Nome e Ingredienti (assumendo siano tra virgolette)
                            // Trova la parte dopo il secondo comma
                            const rest = line.substring(secondComma + 1).trim();
                            // Regex per estrarre due stringhe tra virgolette separate da virgola
                            const parts = rest.match(/"([^"]*)"\s*,\s*"([^"]*)"/);
                            
                            let name = "";
                            let ingStr = "";

                            if (parts && parts.length >= 3) {
                                name = parts[1].replace(/""/g, '"');
                                ingStr = parts[2].replace(/""/g, '"');
                            } else {
                                // Fallback se il formato non è standard (es. editato a mano senza quotes)
                                // Questo è rischioso, ma proviamo
                                const simpleParts = rest.split(',');
                                name = simpleParts[0];
                                ingStr = simpleParts.slice(1).join(',');
                            }

                            // Parsare ingredienti: "Pasta 80g; Pomodoro 100ml"
                            const ingredients = [];
                            if (ingStr) {
                                const ingItems = ingStr.split(';');
                                ingItems.forEach(item => {
                                    item = item.trim();
                                    // Regex: Nome QuantitàUnità (es. "Pasta 80g" o "Olio 10ml")
                                    // Cerca l'ultima parte numerica+testo
                                    const match = item.match(/^(.*)\s+(\d+(?:[.,]\d+)?)([a-zA-Z]+)$/);
                                    if (match) {
                                        ingredients.push({
                                            name: match[1].trim(),
                                            qty: parseFloat(match[2].replace(',', '.')),
                                            unit: match[3]
                                        });
                                    }
                                });
                            }

                            if (name) {
                                newRecipes.push({
                                    id: id || Date.now() + i, // Mantieni ID o genera nuovo
                                    type: type.toString(),
                                    name: name,
                                    ingredients: ingredients
                                });
                            }
                        }

                        if (newRecipes.length > 0) {
                            setRecipes(newRecipes);
                            saveToCloud({ recipes: newRecipes });
                            alert(`Importazione completata! Caricate ${newRecipes.length} ricette.`);
                        } else {
                            alert("Nessuna ricetta valida trovata nel file CSV.");
                        }

                    } catch (err) {
                        console.error("Errore importazione CSV:", err);
                        alert("Errore durante la lettura del file CSV.");
                    }
                    e.target.value = null; // Reset input
                };
                reader.readAsText(file);
            };

            const handlePrint = () => {
                const printArea = document.getElementById('print-area');
                const dates = getDatesOfWeek(currentWeekStart);
                const printHTML = `
                    <div style="font-family: sans-serif; color: #333;">
                        <h1 style="text-align: center; margin-bottom: 20px;">Menu Settimanale: ${formatDateDisplay(currentWeekStart)}</h1>
                        <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                            <thead>
                                <tr style="background: #eee;">
                                    <th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: 10%;">Giorno</th>
                                    <th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: 45%;">Dieta</th>
                                    <th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: 45%;">Famiglia</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${plan.map((slot, i) => {
                                    const date = dates[Math.floor(i/2)];
                                    const dateStr = date.toLocaleDateString('it-IT', {weekday:'short', day:'numeric'});
                                    const rowStyle = i % 2 === 0 ? 'border-top: 2px solid #aaa;' : 'border-bottom: 1px solid #ddd;';
                                    const mealLabel = slot.meal.toUpperCase();
                                    
                                    const myRec = getRecipeById(slot.myRecipe, recipes);
                                    const famRec = getRecipeById(slot.famRecipe, recipes);
                                    const myRecName = escapeHtml(myRec ? myRec.name : (slot.myRecipe ? '[Rimossa]' : '-'));
                                    const famRecName = escapeHtml(famRec ? famRec.name : (slot.famRecipe ? '[Rimossa]' : '-'));
                                    const myIng = escapeHtml(getIngredientsSummary(slot.myRecipe, slot.myPortions, recipes));
                                    const famIng = escapeHtml(getIngredientsSummary(slot.famRecipe, slot.famPortions, recipes));

                                    return `
                                        <tr style="${rowStyle}">
                                            <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                <strong>${i%2===0 ? escapeHtml(dateStr) : ''}</strong>
                                                <div style="font-size: 0.8em; color: #666; margin-top: 2px;">${escapeHtml(mealLabel)}</div>
                                            </td>
                                            <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                <div style="font-weight: bold;">${myRecName}</div>
                                                <div style="font-size: 0.8em;">${escapeHtml(slot.type)}</div>
                                                ${myIng ? `<div style="font-size: 0.8em; color: #555; margin-top: 2px; font-style: italic;">(${myIng})</div>` : ''}
                                            </td>
                                            <td style="padding: 5px; vertical-align: top;">
                                                <div style="font-weight: bold;">${famRecName}</div>
                                                ${famIng ? `<div style="font-size: 0.8em; color: #555; margin-top: 2px; font-style: italic;">(${famIng})</div>` : ''}
                                                ${slot.note ? `<div style="font-size: 0.75em; color: #888; margin-top: 3px;">📝 ${escapeHtml(slot.note)}</div>` : ''}
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                printArea.innerHTML = printHTML;
                window.print();
            };

            const shoppingList = useMemo(() => {
                const list = {};
                plan.forEach(slot => {
                    const myRec = getRecipeById(slot.myRecipe, recipes);
                    if (myRec) {
                        myRec.ingredients.forEach(ing => {
                            const key = `${ing.name} (${ing.unit})`;
                            if (!list[key]) list[key] = { name: ing.name, unit: ing.unit, qty: 0 };
                            list[key].qty += ing.qty * slot.myPortions;
                        });
                    }
                    const famRec = getRecipeById(slot.famRecipe, recipes);
                    if (famRec) {
                        famRec.ingredients.forEach(ing => {
                            const key = `${ing.name} (${ing.unit})`;
                            if (!list[key]) list[key] = { name: ing.name, unit: ing.unit, qty: 0 };
                            list[key].qty += ing.qty * slot.famPortions;
                        });
                    }
                });
                return Object.values(list).sort((a, b) => a.name.localeCompare(b.name));
            }, [plan, recipes]);

            const handleCopy = () => {
                const text = shoppingList.map(item => `- ${item.name}: ${item.qty} ${item.unit}`).join('\n');
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); alert("Copiato!"); } catch (e) {}
                document.body.removeChild(ta);
            };

            if (syncStatus === 'loading' && !db) return <div className="flex h-screen items-center justify-center p-8 text-center text-slate-500">In attesa di connessione...<br/>Controlla la config.</div>;

            return (
                <div className="min-h-screen bg-slate-50 p-2 md:p-8 font-sans pb-24 md:pb-8">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <header className="flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Pianificatore Pasti</h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <div className={`w-2 h-2 rounded-full ${syncStatus === 'saved' ? 'bg-emerald-500' : syncStatus === 'error' ? 'bg-red-500' : syncStatus === 'pending' ? 'bg-amber-400' : 'bg-blue-500 animate-pulse'}`}></div>
                                        <p className="text-xs text-slate-500 font-medium">
                                            {syncStatus === 'saved' ? `Salvato alle ${lastSaveTime || '...'}` : syncStatus === 'pending' ? 'Modifiche in attesa...' : syncStatus === 'sync' ? 'Salvataggio...' : syncError || 'Errore Sync'}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={resetData} className="p-2 hover:bg-slate-100 rounded-full text-slate-600" title="Reset Impostazioni"><Icons.Settings /></button>
                                </div>
                            </div>
                            
                            {/* NAVIGATION */}
                            <nav className="flex gap-2 border-t pt-2" role="tablist" aria-label="Navigazione principale">
                                <button role="tab" aria-selected={activeTab === 'plan'} onClick={() => setActiveTab('plan')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'plan' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.Calendar /> Planner
                                </button>
                                <button role="tab" aria-selected={activeTab === 'shop'} onClick={() => setActiveTab('shop')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'shop' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.ShoppingCart /> Spesa
                                </button>
                                <button role="tab" aria-selected={activeTab === 'recipes'} onClick={() => setActiveTab('recipes')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'recipes' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.BookOpen /> Ricette
                                </button>
                                <button role="tab" aria-selected={activeTab === 'dev'} onClick={() => setActiveTab('dev')} className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 ${activeTab === 'dev' ? 'bg-slate-800 text-white' : 'hover:bg-slate-50 text-slate-600'}`}>
                                    <Icons.Code /> Sviluppo
                                </button>
                            </nav>
                        </header>
                        
                        <main className="animate-fade-in" role="tabpanel">
                            {activeTab === 'plan' && <PlannerView
                                plan={plan}
                                updatePlan={updatePlan}
                                recipes={recipes}
                                mealTypes={MEAL_TYPES}
                                currentWeek={currentWeekStart}
                                changeWeek={changeWeek}
                                resetData={resetData}
                                handlePrint={handlePrint}
                                openAIModal={openAIModal}
                            />}
                            {activeTab === 'shop' && <ShoppingListView shoppingList={shoppingList} handleCopy={handleCopy} checkedItems={weekChecked} toggleCheck={toggleCheck} />}
                            {activeTab === 'recipes' &&
                                <RecipesView
                                    recipes={recipes}
                                    deleteRecipe={deleteRecipe}
                                    onAddRecipe={handleAddRecipe}
                                    onEditRecipe={handleEditRecipe}
                                    onImportRecipes={handleImportRecipes}
                                    openAIModal={openAIModal}
                                />
                            }
                            {activeTab === 'dev' && <SviluppoView />}
                        </main>
                    </div>
                    
                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={editingRecipe ? "Modifica Ricetta" : "Nuova Ricetta"}>
                        <RecipeForm
                            onSave={saveRecipeFromForm}
                            initialData={editingRecipe}
                        />
                    </Modal>

                    <AIRecipeGenerator
                        isOpen={isAIModalOpen}
                        onClose={() => setIsAIModalOpen(false)}
                        mode={aiMode}
                        plan={plan}
                        recipes={recipes}
                        onAddRecipes={addGeneratedRecipes}
                        mealTypes={MEAL_TYPES}
                        familyPrefs={familyPrefs}
                        onSavePrefs={saveFamilyPrefs}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
