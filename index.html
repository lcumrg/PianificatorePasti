                                                            const active = plan.conflicts.some(c => c === `${a.id}:${b.id}` || c === `${b.id}:${a.id}`);
                                                            return (
                                                                <button key={`${a.id}-${b.id}`} onClick={() => toggleConflict(plan.id, a.id, b.id)}
                                                                    className={`w-full flex items-center gap-2 text-xs px-3 py-2 rounded-lg border font-medium transition-all text-left ${active ? 'bg-red-50 text-red-700 border-red-300 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-300'}`}>
                                                                    <span className={`w-4 h-4 rounded border-2 flex items-center justify-center flex-shrink-0 ${active ? 'border-red-500 bg-red-500 text-white' : 'border-slate-300'}`}>
                                                                        {active && <span className="text-[10px] font-bold">x</span>}
                                                                    </span>
                                                                    <span className="font-bold">{a.label || a.id}</span>
                                                                    <span className="text-slate-400">e</span>
                                                                    <span className="font-bold">{b.label || b.id}</span>
                                                                    {active && <span className="ml-auto text-red-500 text-[10px] font-bold uppercase">non nello stesso giorno</span>}
                                                                </button>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    );
                                })()}
                            </Card>
                        );
                    })}

                    <button onClick={handleSave} disabled={hasTargetOverflow} className={`w-full text-white text-sm font-bold py-2.5 rounded-lg transition-all ${saved ? 'bg-emerald-500' : hasTargetOverflow ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700'}`}>
                        {saved ? 'Salvato!' : hasTargetOverflow ? 'Correggi i target per salvare' : 'Salva piani alimentari'}
                    </button>

                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Gestione dati</h3>
                        <button onClick={resetData} className="text-sm text-red-600 border border-red-200 px-4 py-2 rounded-lg hover:bg-red-50 font-medium">
                            Reset database predefinito
                        </button>
                        <p className="text-xs text-slate-400 mt-2">Cancella tutte le modifiche e ripristina ricette e piani di default.</p>
                    </Card>
                </div>
            );
        };

        // --- COMPONENTE FORM PRODOTTO DISPENSA ---
        const PantryItemForm = ({ onSave, onCancel, initialData, allIngredients, resolveCategory }) => {
            const [name, setName] = useState(initialData?.name || '');
            const [qty, setQty] = useState(initialData?.qty || '');
            const [unit, setUnit] = useState(initialData?.unit || 'g');
            const [container, setContainer] = useState(initialData?.container || 'dispensa');
            const [category, setCategory] = useState(initialData?.category || 'Altro');
            const [notes, setNotes] = useState(initialData?.notes || '');
            const [suggestions, setSuggestions] = useState([]);

            const handleNameChange = (val) => {
                setName(val);
                if (val.length >= 2) {
                    const matches = allIngredients.filter(n => n.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
                    setSuggestions(matches);
                } else {
                    setSuggestions([]);
                }
                const cat = resolveCategory(val);
                setCategory(cat);
            };

            const selectSuggestion = (s) => {
                setName(s);
                setSuggestions([]);
                setCategory(resolveCategory(s));
            };

            const handleSubmit = () => {
                if (!name.trim() || !qty) return;
                onSave({
                    id: initialData?.id || Date.now() + Math.random(),
                    name: name.trim(),
                    qty: parseFloat(String(qty).replace(',', '.')),
                    unit, container, category, notes
                });
            };

            return (
                <div className="space-y-3">
                    <div className="relative">
                        <label className="block text-xs font-bold text-slate-600 mb-1">Nome prodotto</label>
                        <input type="text" value={name} onChange={(e) => handleNameChange(e.target.value)}
                            className="w-full border rounded-lg p-2 text-sm" placeholder="Es: Pasta, Pollo, Mozzarella..." autoFocus />
                        {suggestions.length > 0 && (
                            <div className="absolute z-10 w-full bg-white border rounded-lg shadow-lg mt-1 max-h-32 overflow-y-auto">
                                {suggestions.map(s => (
                                    <button key={s} onClick={() => selectSuggestion(s)}
                                        className="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 border-b last:border-0">{s}</button>
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">Quantita</label>
                            <input type="number" value={qty} onChange={(e) => setQty(e.target.value)}
                                className="w-full border rounded-lg p-2 text-sm" placeholder="0" min="0" step="1" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">Unita</label>
                            <select value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full border rounded-lg p-2 text-sm">
                                <option value="g">g</option><option value="ml">ml</option><option value="pz">pz</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-600 mb-1">Dove</label>
                            <select value={container} onChange={(e) => setContainer(e.target.value)} className="w-full border rounded-lg p-2 text-sm">
                                <option value="dispensa">Dispensa</option><option value="frigo">Frigo</option><option value="freezer">Freezer</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">Categoria</label>
                        <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full border rounded-lg p-2 text-sm">
                            {CATEGORY_ORDER.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>
                    <div>
                        <label className="block text-xs font-bold text-slate-600 mb-1">Note (opzionale)</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)}
                            className="w-full border rounded-lg p-2 text-sm" placeholder="Es: surgelato pronto, da scongelare..." />
                    </div>
                    <div className="flex gap-2 pt-2">
                        <button onClick={handleSubmit} className="flex-1 bg-emerald-600 text-white font-bold py-2 rounded-lg text-sm hover:bg-emerald-700">
                            {initialData ? 'Salva Modifiche' : 'Aggiungi'}
                        </button>
                        <button onClick={onCancel} className="flex-1 bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-sm hover:bg-slate-300">Annulla</button>
                    </div>
                </div>
            );
        };

        // --- MODAL SCANSIONE SCONTRINO ---
        const ReceiptScanModal = ({ isOpen, onClose, onAddProducts, existingPantry, resolveCategory }) => {
            const [step, setStep] = useState(0);
            const [images, setImages] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [proposedProducts, setProposedProducts] = useState([]);

            useEffect(() => {
                if (!isOpen) { setStep(0); setImages([]); setError(null); setProposedProducts([]); }
            }, [isOpen]);

            const handleImageAdd = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImages(prev => [...prev, { data: ev.target.result, name: file.name }]);
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            };

            const removeImage = (idx) => {
                setImages(prev => prev.filter((_, i) => i !== idx));
            };

            const handleScan = async () => {
                if (images.length === 0) return;
                setStep(1);
                setLoading(true);
                setError(null);

                try {
                    const resp = await fetch('/.netlify/functions/generate-recipe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            mode: 'parse_receipt',
                            images: images.map(img => img.data),
                            existingPantry: existingPantry.map(p => ({ name: p.name, qty: p.qty, unit: p.unit, container: p.container })),
                        })
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Errore nella scansione');

                    const products = (data.products || []).map((p, i) => {
                        const match = existingPantry.find(ep =>
                            ep.name.toLowerCase() === p.name.toLowerCase() && ep.unit === p.unit
                        );
                        return {
                            ...p,
                            id: Date.now() + i,
                            category: p.category || resolveCategory(p.name),
                            container: p.container || 'dispensa',
                            existingQty: match ? match.qty : 0,
                            include: true,
                        };
                    });
                    setProposedProducts(products);
                    setStep(2);
                } catch (err) {
                    setError(err.message);
                    setStep(0);
                } finally {
                    setLoading(false);
                }
            };

            const updateProduct = (idx, field, value) => {
                setProposedProducts(prev => prev.map((p, i) => i === idx ? { ...p, [field]: value } : p));
            };

            const handleConfirm = () => {
                const toAdd = proposedProducts.filter(p => p.include).map(p => ({
                    name: p.name, qty: p.qty, unit: p.unit, container: p.container, category: p.category, notes: ''
                }));
                onAddProducts(toAdd);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Scansione Scontrino">
                    <div className="space-y-4">
                        {step === 0 && (
                            <>
                                <p className="text-sm text-slate-600">Scatta o carica foto dello scontrino. L'AI analizzerà i prodotti.</p>
                                <div className="flex flex-wrap gap-2">
                                    {images.map((img, idx) => (
                                        <div key={idx} className="relative w-20 h-20 rounded-lg overflow-hidden border">
                                            <img src={img.data} alt={img.name} className="w-full h-full object-cover" />
                                            <button onClick={() => removeImage(idx)}
                                                className="absolute top-0 right-0 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center">x</button>
                                        </div>
                                    ))}
                                    <label className="w-20 h-20 rounded-lg border-2 border-dashed border-slate-300 flex items-center justify-center cursor-pointer hover:border-slate-400">
                                        <input type="file" accept="image/*" capture="environment" multiple onChange={handleImageAdd} className="hidden" />
                                        <Icons.Camera />
                                    </label>
                                </div>
                                {error && <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm">{error}</div>}
                                <button onClick={handleScan} disabled={images.length === 0}
                                    className="w-full bg-violet-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-violet-700 disabled:opacity-50 flex items-center justify-center gap-2">
                                    <Icons.Sparkle /> Analizza Scontrino
                                </button>
                            </>
                        )}

                        {step === 1 && loading && (
                            <div className="text-center py-8">
                                <svg className="animate-spin h-8 w-8 mx-auto mb-4 text-violet-600" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                                <p className="text-slate-600 font-bold">Analisi in corso...</p>
                                <p className="text-xs text-slate-400 mt-1">Claude sta leggendo lo scontrino</p>
                            </div>
                        )}

                        {step === 2 && (
                            <>
                                <p className="text-sm text-slate-600 font-bold">Prodotti trovati: {proposedProducts.length}</p>
                                <div className="max-h-[50vh] overflow-y-auto space-y-2">
                                    {proposedProducts.map((p, idx) => (
                                        <div key={idx} className={`border rounded-lg p-3 space-y-2 ${p.include ? 'bg-white' : 'bg-slate-50 opacity-50'}`}>
                                            <div className="flex items-center gap-2">
                                                <input type="checkbox" checked={p.include} onChange={(e) => updateProduct(idx, 'include', e.target.checked)} />
                                                <input type="text" value={p.name} onChange={(e) => updateProduct(idx, 'name', e.target.value)}
                                                    className="flex-1 border rounded px-2 py-1 text-sm font-bold" />
                                                <input type="number" value={p.qty} onChange={(e) => updateProduct(idx, 'qty', parseFloat(e.target.value) || 0)}
                                                    className="w-16 border rounded px-2 py-1 text-sm text-right" min="0" />
                                                <select value={p.unit} onChange={(e) => updateProduct(idx, 'unit', e.target.value)} className="border rounded px-1 py-1 text-sm">
                                                    <option value="g">g</option><option value="ml">ml</option><option value="pz">pz</option>
                                                </select>
                                            </div>
                                            <div className="flex items-center gap-2 text-xs">
                                                <select value={p.container} onChange={(e) => updateProduct(idx, 'container', e.target.value)} className="border rounded px-1 py-0.5 text-xs">
                                                    <option value="dispensa">Dispensa</option><option value="frigo">Frigo</option><option value="freezer">Freezer</option>
                                                </select>
                                                <select value={p.category} onChange={(e) => updateProduct(idx, 'category', e.target.value)} className="border rounded px-1 py-0.5 text-xs">
                                                    {CATEGORY_ORDER.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                                {p.existingQty > 0 && (
                                                    <span className="text-amber-600 font-bold">Gia presente: {p.existingQty}{p.unit}</span>
                                                )}
                                                {p.rawText && <span className="text-slate-400 truncate" title={p.rawText}>({p.rawText})</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {proposedProducts.length === 0 && (
                                    <div className="text-center text-slate-400 py-4">Nessun prodotto trovato nello scontrino.</div>
                                )}
                                <div className="flex gap-2">
                                    <button onClick={handleConfirm} disabled={proposedProducts.filter(p => p.include).length === 0}
                                        className="flex-1 bg-emerald-600 text-white font-bold py-2 rounded-lg text-sm hover:bg-emerald-700 disabled:opacity-50">
                                        Aggiungi {proposedProducts.filter(p => p.include).length} prodotti
                                    </button>
                                    <button onClick={onClose} className="flex-1 bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-sm hover:bg-slate-300">Annulla</button>
                                </div>
                            </>
                        )}
                    </div>
                </Modal>
            );
        };

        // --- MODAL CONFERMA SCARICO ---
        const DeductionConfirmModal = ({ isOpen, onClose, slot, recipes, pantry, findPantryMatch, onConfirm }) => {
            const [deductions, setDeductions] = useState([]);

            useEffect(() => {
                if (!isOpen || !slot) return;
                const items = [];
                if (slot.tracks) {
                    Object.values(slot.tracks).forEach(track => {
                        const rec = getRecipeById(track.recipe, recipes);
                        if (rec) {
                            rec.ingredients.forEach(ing => {
                                if (ing.unit === 'qb') return;
                                const needed = ing.qty * (track.portions || 1);
                                const match = findPantryMatch(ing.name, ing.unit);
                                const existing = items.find(d => d.ingredientName === ing.name && d.unit === ing.unit);
                                if (existing) {
                                    existing.amount += needed;
                                } else {
                                    items.push({
                                        ingredientName: ing.name,
                                        unit: ing.unit,
                                        amount: needed,
                                        pantryItemId: match?.id || null,
                                        available: match?.qty || 0,
                                        enabled: !!match,
                                    });
                                }
                            });
                        }
                    });
                }
                setDeductions(items);
            }, [isOpen, slot]);

            const updateDeduction = (idx, field, value) => {
                setDeductions(prev => prev.map((d, i) => i === idx ? { ...d, [field]: value } : d));
            };

            const handleConfirm = () => {
                const toDeduct = deductions.filter(d => d.enabled && d.pantryItemId)
                    .map(d => ({ pantryItemId: d.pantryItemId, amount: d.amount }));
                onConfirm(toDeduct);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={`Scarico: ${slot?.day} ${slot?.meal}`}>
                    <div className="space-y-3">
                        <p className="text-sm text-slate-600">Conferma gli ingredienti da scalare dalla dispensa:</p>
                        <div className="max-h-[50vh] overflow-y-auto space-y-2">
                            {deductions.map((d, idx) => (
                                <div key={idx} className={`flex items-center gap-2 p-2 rounded-lg border ${d.pantryItemId ? 'bg-white' : 'bg-slate-50'}`}>
                                    <input type="checkbox" checked={d.enabled} onChange={(e) => updateDeduction(idx, 'enabled', e.target.checked)}
                                        disabled={!d.pantryItemId} />
                                    <span className={`flex-1 text-sm ${d.pantryItemId ? 'text-slate-800' : 'text-slate-400'}`}>{d.ingredientName}</span>
                                    <input type="number" value={d.amount} onChange={(e) => updateDeduction(idx, 'amount', parseFloat(e.target.value) || 0)}
                                        className="w-16 border rounded px-2 py-1 text-sm text-right" min="0" step="1" />
                                    <span className="text-xs text-slate-500">{d.unit}</span>
                                    {d.pantryItemId ? (
                                        <span className="text-xs text-emerald-600">({d.available}{d.unit} disp.)</span>
                                    ) : (
                                        <span className="text-xs text-slate-400">(non in dispensa)</span>
                                    )}
                                </div>
                            ))}
                        </div>
                        {deductions.length === 0 && <p className="text-center text-slate-400 text-sm py-4">Nessun ingrediente da scalare.</p>}
                        <div className="flex gap-2 pt-2">
                            <button onClick={handleConfirm}
                                className="flex-1 bg-emerald-600 text-white font-bold py-2 rounded-lg text-sm hover:bg-emerald-700">
                                Conferma Scarico
                            </button>
                            <button onClick={onClose}
                                className="flex-1 bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-sm hover:bg-slate-300">
                                Salta
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // --- VISTA DISPENSA ---
        const PantryView = ({ pantry, onAdd, onRemove, onUpdate, onOpenReceipt, resolveCategory, allIngredients }) => {
            const [activeContainer, setActiveContainer] = useState('all');
            const [search, setSearch] = useState('');
            const [editingItem, setEditingItem] = useState(null);
            const [showAddForm, setShowAddForm] = useState(false);

            const filtered = useMemo(() => {
                let items = pantry;
                if (activeContainer !== 'all') items = items.filter(p => p.container === activeContainer);
                if (search) {
                    const s = search.toLowerCase();
                    items = items.filter(p => p.name.toLowerCase().includes(s));
                }
                return items;
            }, [pantry, activeContainer, search]);

            const grouped = useMemo(() => {
                const groups = {};
                filtered.forEach(item => {
                    const cat = item.category || resolveCategory(item.name);
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });
                return CATEGORY_ORDER.filter(c => groups[c]).map(c => ({ category: c, items: groups[c] }));
            }, [filtered]);

            const containerCounts = useMemo(() => ({
                dispensa: pantry.filter(p => p.container === 'dispensa').length,
                frigo: pantry.filter(p => p.container === 'frigo').length,
                freezer: pantry.filter(p => p.container === 'freezer').length,
            }), [pantry]);

            const handleQuickQty = (item, delta) => {
                const newQty = Math.max(0, item.qty + delta);
                if (newQty === 0) {
                    if (confirm(`Rimuovere ${item.name} dalla dispensa?`)) onRemove(item.id);
                } else {
                    onUpdate(item.id, { qty: newQty });
                }
            };

            const handleSaveItem = (item) => {
                if (editingItem) {
                    onUpdate(item.id, item);
                } else {
                    onAdd([item]);
                }
                setEditingItem(null);
                setShowAddForm(false);
            };

            return (
                <div className="space-y-4 pb-20">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Dispensa</h2>
                        <div className="flex gap-2">
                            <button onClick={onOpenReceipt} className="bg-violet-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow hover:bg-violet-700 flex items-center gap-1">
                                <Icons.Camera /> <span className="hidden md:inline">Scontrino</span>
                            </button>
                            <button onClick={() => { setEditingItem(null); setShowAddForm(true); }}
                                className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow hover:bg-emerald-700">+ Aggiungi</button>
                        </div>
                    </div>

                    {/* Container badges */}
                    <div className="flex gap-2">
                        <button onClick={() => setActiveContainer('all')}
                            className={`px-3 py-1.5 rounded-full text-xs font-bold ${activeContainer === 'all' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>
                            Tutto ({pantry.length})
                        </button>
                        {Object.entries(CONTAINER_INFO).map(([key, info]) => (
                            <button key={key} onClick={() => setActiveContainer(key)}
                                className={`px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1 ${activeContainer === key ? 'bg-slate-800 text-white' : info.color}`}>
                                {info.emoji} {info.label} ({containerCounts[key]})
                            </button>
                        ))}
                    </div>

                    {/* Search */}
                    <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
                        placeholder="Cerca prodotto..." className="w-full border rounded-lg p-2 text-sm" />

                    {/* Add/Edit form in modal */}
                    {(showAddForm || editingItem) && (
                        <Modal isOpen={true} onClose={() => { setShowAddForm(false); setEditingItem(null); }}
                            title={editingItem ? 'Modifica Prodotto' : 'Aggiungi Prodotto'}>
                            <PantryItemForm
                                onSave={handleSaveItem}
                                onCancel={() => { setShowAddForm(false); setEditingItem(null); }}
                                initialData={editingItem}
                                allIngredients={allIngredients}
                                resolveCategory={resolveCategory}
                            />
                        </Modal>
                    )}

                    {/* Products list */}
                    {pantry.length === 0 ? (
                        <Card className="p-8 text-center text-slate-400">
                            <p className="text-lg mb-2">Dispensa vuota</p>
                            <p className="text-sm">Aggiungi prodotti manualmente o scansiona uno scontrino.</p>
                        </Card>
                    ) : filtered.length === 0 ? (
                        <Card className="p-8 text-center text-slate-400">Nessun prodotto trovato.</Card>
                    ) : (
                        <div className="space-y-4">
                            {grouped.map(({ category, items }) => (
                                <div key={category} className="bg-white rounded-xl shadow overflow-hidden">
                                    <div className={`px-4 py-2 font-bold text-sm ${CATEGORY_COLORS[category] || 'bg-slate-100 text-slate-700'}`}>
                                        {category} ({items.length})
                                    </div>
                                    {items.map(item => (
                                        <div key={item.id} className="flex items-center p-3 border-b border-slate-100 gap-2">
                                            <span className="text-sm mr-1">{CONTAINER_INFO[item.container]?.emoji}</span>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-sm font-bold text-slate-800 truncate">{item.name}</div>
                                                {item.notes && <div className="text-xs text-slate-400 truncate">{item.notes}</div>}
                                            </div>
                                            <div className="flex items-center gap-1 shrink-0">
                                                <button onClick={() => handleQuickQty(item, -(item.unit === 'pz' ? 1 : (item.unit === 'g' ? 50 : 50)))}
                                                    className="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200">
                                                    <Icons.Minus />
                                                </button>
                                                <span className="font-bold text-sm text-slate-700 min-w-[50px] text-center">{item.qty}{item.unit}</span>
                                                <button onClick={() => handleQuickQty(item, item.unit === 'pz' ? 1 : (item.unit === 'g' ? 50 : 50))}
                                                    className="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200 text-lg leading-none">+</button>
                                            </div>
                                            <button onClick={() => setEditingItem(item)} className="p-1.5 hover:bg-slate-100 rounded text-slate-400"><Icons.Edit /></button>
                                            <button onClick={() => { if (confirm(`Rimuovere ${item.name}?`)) onRemove(item.id); }} className="p-1.5 hover:bg-red-50 rounded text-red-400"><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- SEZIONE SVILUPPO ---
        const SviluppoView = () => {
            const APP_VERSION = "4.0.0";
            const LAST_UPDATE = "Aprile 2026";

            const features = [
                { status: 'done', label: 'Pianificazione settimanale pranzo/cena', desc: 'Piano per 7 giorni con doppio binario dieta + famiglia' },
                { status: 'done', label: 'Database ricette con CRUD', desc: 'Creazione, modifica, eliminazione ricette con ingredienti e grammature' },
                { status: 'done', label: 'Lista spesa automatica', desc: 'Generazione ingredienti aggregati con checkbox per settimana' },
                { status: 'done', label: 'Categorie lista spesa', desc: 'Raggruppamento per reparto: verdura, carne, pesce, dispensa...' },
                { status: 'done', label: 'Validazione dietetica', desc: 'Conteggio tipi pasto settimanali con obiettivi e conflitti' },
                { status: 'done', label: 'Generazione ricette con AI', desc: 'Claude AI con profilo famiglia personalizzato, da ingredienti o per completare il piano' },
                { status: 'done', label: 'Sync cloud real-time', desc: 'Firebase Firestore con debounce intelligente e stato di sincronizzazione' },
                { status: 'done', label: 'Import/Export CSV', desc: 'Backup e ripristino del database ricette' },
                { status: 'done', label: 'Stampa menu settimanale', desc: 'Layout ottimizzato per stampa A4 con ingredienti e note' },
                { status: 'done', label: 'Note per pasto', desc: 'Campo note libero per ogni slot del piano' },
                { status: 'done', label: 'PWA installabile', desc: 'Service worker per cache, installabile su mobile come app nativa' },
                { status: 'done', label: 'Accessibilita base', desc: 'ARIA labels, navigazione semantica, focus trap modal, reduced motion' },
                { status: 'done', label: 'Piani alimentari multipli configurabili', desc: 'Ogni membro della famiglia puo\' avere il proprio piano con categorie, target e conflitti personalizzati' },
                { status: 'done', label: 'Metodi di cottura preferiti', desc: 'Selezione metodi cottura nel generatore AI per ricette piu\' mirate' },
                { status: 'done', label: 'AI: piano settimanale automatico', desc: 'Genera un piano completo tenendo conto della dispensa e dei prodotti disponibili' },
                { status: 'done', label: 'Error Boundary', desc: 'Gestione errori con schermata di recupero invece di schermo bianco' },
                { status: 'done', label: 'Offline persistence', desc: 'Cache Firestore locale per funzionamento offline' },
                { status: 'done', label: 'Rate limit AI', desc: 'Cooldown 10 secondi tra le generazioni AI per evitare costi accidentali' },
                { status: 'done', label: 'Gestione dispensa completa', desc: 'Inventario prodotti con 3 contenitori (Dispensa, Frigo, Freezer), quantita nette e categorie' },
                { status: 'done', label: 'Inserimento da foto scontrino', desc: 'Claude Vision analizza foto dello scontrino e propone prodotti da aggiungere alla dispensa' },
                { status: 'done', label: 'Scarico ingredienti ibrido', desc: 'Proposta automatica di scarico dopo pasto completato + gestione manuale per consumi extra' },
                { status: 'done', label: 'Spesa intelligente con dispensa', desc: 'Lista spesa calcola solo la differenza tra necessario e disponibile in dispensa' },
                { status: 'done', label: 'AI: categorizzazione automatica ingredienti', desc: 'Categoria assegnata automaticamente con apprendimento dalle scelte utente' },
                { status: 'done', label: 'AI: pianificazione con dispensa', desc: 'L\'AI tiene conto automaticamente dei prodotti in dispensa per il piano settimanale' },
            ];

            const roadmap = [
                { priority: 'alta', label: 'Autenticazione Firebase', desc: 'Login Google per proteggere i dati della famiglia con accesso sicuro' },
                { priority: 'media', label: 'Drag & drop piano', desc: 'Riorganizzare i pasti trascinando le ricette tra gli slot' },
                { priority: 'media', label: 'Storico settimane', desc: 'Visualizzare e confrontare piani delle settimane passate' },
                { priority: 'bassa', label: 'Notifiche push', desc: 'Promemoria per la preparazione pasti e la spesa' },
                { priority: 'bassa', label: 'Multi-famiglia', desc: 'Supporto per piu famiglie/utenti con dati separati' },
                { priority: 'bassa', label: 'Tema scuro', desc: 'Dark mode per uso serale' },
            ];

            const costs = [
                { category: 'AI (Claude API)', items: [
                    { label: 'Genera 2-3 ricette', detail: '~1500 token in + ~800 token out', cost: '~$0.01' },
                    { label: 'Piano settimanale completo', detail: '~3000 token in + ~2000 token out', cost: '~$0.025' },
                    { label: 'Analisi foto scontrino', detail: '~2000 token in (con immagine) + ~1000 token out', cost: '~$0.02-0.05' },
                    { label: 'Uso familiare tipico', detail: '~4-8 chiamate/settimana', cost: '~$0.50-1.00/mese' },
                ]},
                { category: 'Infrastruttura', items: [
                    { label: 'Netlify (hosting + functions)', detail: 'Free tier: 125k invocazioni/mese', cost: '$0' },
                    { label: 'Firebase Firestore', detail: 'Free tier: 50k letture + 20k scritture/giorno', cost: '$0' },
                    { label: 'Dominio', detail: 'Incluso con Netlify (*.netlify.app)', cost: '$0' },
                ]},
            ];

            const statusIcon = { done: '✅', wip: '🔧' };
            const priorityColors = { alta: 'bg-red-100 text-red-800', media: 'bg-amber-100 text-amber-800', bassa: 'bg-slate-100 text-slate-600' };

            return (
                <div className="space-y-6 pb-20">
                    <div className="text-center">
                        <h2 className="text-2xl font-bold text-slate-800">Pianificatore Pasti</h2>
                        <p className="text-slate-400 text-sm mt-1">v{APP_VERSION} · Ultimo aggiornamento: {LAST_UPDATE}</p>
                    </div>

                    {/* Descrizione progetto */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-2">Il Progetto</h3>
                        <p className="text-sm text-slate-600 leading-relaxed">
                            Un'app pensata per famiglie che vogliono seguire un piano alimentare sano senza impazzire nell'organizzazione.
                            L'obiettivo e rendere <strong>pratico e veloce</strong> pianificare i pasti settimanali, gestire la dispensa,
                            ottimizzare la spesa e adattare le routine alimentari familiari con il supporto dell'intelligenza artificiale.
                        </p>
                        <p className="text-sm text-slate-600 leading-relaxed mt-2">
                            Ideale per <strong>famiglie numerose</strong> dove il tempo e prezioso: doppio binario dieta personale + famiglia,
                            gestione dispensa con 3 contenitori (Dispensa, Frigo, Freezer), inserimento prodotti da foto scontrino,
                            lista spesa intelligente che sottrae il disponibile, e generazione ricette AI che tiene conto di tutto.
                        </p>
                    </Card>

                    {/* Tech stack */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-2">Tecnologie</h3>
                        <div className="flex flex-wrap gap-2">
                            {['React 18', 'Firebase Firestore', 'Tailwind CSS', 'Claude AI (Anthropic)', 'Netlify Functions', 'PWA'].map(t => (
                                <span key={t} className="text-xs bg-slate-100 text-slate-700 px-2 py-1 rounded-full font-medium">{t}</span>
                            ))}
                        </div>
                    </Card>

                    {/* Feature completate */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Funzionalita ({features.length})</h3>
                        <div className="space-y-2">
                            {features.map((f, i) => (
                                <div key={i} className="flex gap-2 items-start">
                                    <span className="shrink-0 mt-0.5">{statusIcon[f.status]}</span>
                                    <div>
                                        <div className="text-sm font-bold text-slate-700">{f.label}</div>
                                        <div className="text-xs text-slate-400">{f.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>

                    {/* Roadmap */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Roadmap</h3>
                        <div className="space-y-2">
                            {roadmap.map((r, i) => (
                                <div key={i} className="flex gap-2 items-start">
                                    <span className={`text-xs px-2 py-0.5 rounded-full font-bold shrink-0 mt-0.5 ${priorityColors[r.priority]}`}>{r.priority}</span>
                                    <div>
                                        <div className="text-sm font-bold text-slate-700">{r.label}</div>
                                        <div className="text-xs text-slate-400">{r.desc}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>

                    {/* Analisi Costi */}
                    <Card className="p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Analisi Costi</h3>
                        {costs.map(section => (
                            <div key={section.category} className="mb-4 last:mb-0">
                                <h4 className="text-sm font-bold text-slate-600 mb-2">{section.category}</h4>
                                <div className="space-y-1">
                                    {section.items.map((item, i) => (
                                        <div key={i} className="flex justify-between items-center text-xs bg-slate-50 p-2 rounded">
                                            <div>
                                                <span className="font-bold text-slate-700">{item.label}</span>
                                                <span className="text-slate-400 ml-2">{item.detail}</span>
                                            </div>
                                            <span className="font-bold text-slate-800 shrink-0 ml-2">{item.cost}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                        <div className="mt-3 bg-emerald-50 border border-emerald-200 p-3 rounded-lg text-center">
                            <span className="text-sm font-bold text-emerald-800">Costo totale stimato: ~$1-2/mese</span>
                            <span className="text-xs text-emerald-600 block mt-1">Solo costi API Claude per uso familiare tipico</span>
                        </div>
                    </Card>

                    <div className="text-center text-xs text-slate-400 space-y-1">
                        <p>Sviluppato con Claude Code (Anthropic)</p>
                        <p>Repo: github.com/lcumrg/PianificatorePasti</p>
                    </div>
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('ErrorBoundary caught:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-50 text-center">
                            <div className="bg-white p-8 rounded-xl shadow-lg max-w-md">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h2 className="text-xl font-bold text-slate-800 mb-2">Qualcosa e' andato storto</h2>
                                <p className="text-sm text-slate-500 mb-4">L'app ha riscontrato un errore imprevisto. I tuoi dati sono al sicuro nel cloud.</p>
                                <p className="text-xs text-red-400 mb-6 font-mono bg-red-50 p-2 rounded">{this.state.error?.message || 'Errore sconosciuto'}</p>
                                <button onClick={() => window.location.reload()} className="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold text-sm hover:bg-slate-700">Ricarica App</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function App() {
            const [activeTab, setActiveTab] = useState('plan');
            const [syncStatus, setSyncStatus] = useState('loading');
            const [syncError, setSyncError] = useState(null);
            const [lastSaveTime, setLastSaveTime] = useState(null);

            const [recipes, setRecipes] = useState(DEFAULT_RECIPES);
            const [checkedItems, setCheckedItems] = useState({});
            const [dietPlans, setDietPlans] = useState(DEFAULT_DIET_PLANS);

            const [currentWeekStart, setCurrentWeekStart] = useState(getMonday(new Date()));
            const [weeklyPlans, setWeeklyPlans] = useState({});
            const currentWeekKey = formatDateKey(currentWeekStart);
            const plan = weeklyPlans[currentWeekKey] || DEFAULT_PLAN;

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);

            // --- AI GENERATOR ---
            const [isAIModalOpen, setIsAIModalOpen] = useState(false);
            const [isAIWeeklyModalOpen, setIsAIWeeklyModalOpen] = useState(false);
            const [fridgeIngredients, setFridgeIngredients] = useState({});
            const [aiRecipePrefilledIngredients, setAiRecipePrefilledIngredients] = useState('');
            const openAIModal = () => setIsAIModalOpen(true);

            // --- DISPENSA ---
            const [pantry, setPantry] = useState([]);
            const [customCategories, setCustomCategories] = useState({});

            const resolveCategory = (ingredientName) => {
                if (!ingredientName) return 'Altro';
                return INGREDIENT_CATEGORIES[ingredientName]
                    || customCategories[ingredientName.toLowerCase()]
                    || (pantry.find(p => p.name.toLowerCase() === ingredientName.toLowerCase()) || {}).category
                    || 'Altro';
            };
            // Aggiorna il riferimento globale usato da ShoppingListView
            getIngredientCategory = resolveCategory;

            const learnCategory = (ingredientName, category) => {
                if (!ingredientName || INGREDIENT_CATEGORIES[ingredientName]) return;
                const updated = { ...customCategories, [ingredientName.toLowerCase()]: category };
                setCustomCategories(updated);
                saveToCloud({ customCategories: updated });
            };

            const findPantryMatch = (ingredientName, unit) => {
                if (!ingredientName) return null;
                const nameLower = ingredientName.toLowerCase();
                return pantry.find(p => {
                    const pLower = p.name.toLowerCase();
                    return (pLower === nameLower || pLower.includes(nameLower) || nameLower.includes(pLower))
                        && (!unit || p.unit === unit);
                });
            };

            const addToPantry = (items) => {
                let updated = [...pantry];
                items.forEach(item => {
                    const existing = updated.find(p =>
                        p.name.toLowerCase() === item.name.toLowerCase() && p.unit === item.unit && p.container === item.container
                    );
                    if (existing) {
                        existing.qty += item.qty;
                    } else {
                        updated.push({ ...item, id: Date.now() + Math.random() });
                    }
                    if (item.category && item.category !== 'Altro') {
                        learnCategory(item.name, item.category);
                    }
                });
                setPantry(updated);
                saveToCloud({ pantry: updated });
            };

            const removeFromPantry = (id) => {
                const updated = pantry.filter(p => p.id !== id);
                setPantry(updated);
                saveToCloud({ pantry: updated });
            };

            const updatePantryItem = (id, updates) => {
                const updated = pantry.map(p => p.id === id ? { ...p, ...updates } : p);
                setPantry(updated);
                saveToCloud({ pantry: updated });
                if (updates.category && updates.name) {
                    learnCategory(updates.name, updates.category);
                }
            };

            const deductFromPantry = (deductions) => {
                const updated = pantry.map(item => {
                    const d = deductions.find(d => d.pantryItemId === item.id);
                    if (d) return { ...item, qty: Math.max(0, item.qty - d.amount) };
                    return item;
                }).filter(item => item.qty > 0);
                setPantry(updated);
                saveToCloud({ pantry: updated });
            };

            // --- DEDUCTION MODAL ---
            const [deductionModal, setDeductionModal] = useState(null);

            const markSlotDone = (slot) => {
                if (!slot) return;
                const slotIndex = plan.findIndex(s => s.day === slot.day && s.meal === slot.meal);
                if (slotIndex >= 0 && !plan[slotIndex].done) {
                    const newPlan = plan.map((s, i) => i === slotIndex ? { ...s, done: true } : s);
                    const newWeeklyPlans = { ...weeklyPlans, [currentWeekKey]: newPlan };
                    setWeeklyPlans(newWeeklyPlans);
                    saveToCloud({ weeklyPlans: newWeeklyPlans });
                }
            };

            // Aggiorna variabili globali derivate quando dietPlans cambia
            useEffect(() => {
                MEAL_TYPES = getAllMealTypes(dietPlans);
                DIET_GUIDELINES = getDietGuidelines(dietPlans);
            }, [dietPlans]);


            const saveDietPlans = (plans) => {
                setDietPlans(plans);
                saveToCloud({ dietPlans: plans });
            };

            const addGeneratedRecipes = (newRecipes) => {
                const updated = [...recipes, ...newRecipes.map(r => ({ ...r, id: Date.now() + Math.random() }))];
                setRecipes(updated);
                saveToCloud({ recipes: updated });
            };

            // --- DEBOUNCE SYSTEM ---
            const debounceTimerRef = useRef(null);
            const pendingDataRef = useRef(null);

            const saveToCloudImmediate = (dataToUpdate) => {
                if(!db) return;
                if (debounceTimerRef.current) {
                    clearTimeout(debounceTimerRef.current);
                    debounceTimerRef.current = null;
                }
                pendingDataRef.current = null;
                setSyncStatus('sync');
                const fullData = { recipes, checkedItems, weeklyPlans, dietPlans, fridgeIngredients, pantry, customCategories, lastUpdate: new Date().toISOString(), ...dataToUpdate };
                db.collection('app_pasti').doc(DOC_ID).set(fullData)
                    .then(() => setTimeout(() => setSyncStatus('saved'), 500))
                    .catch((err) => { console.error(err); setSyncStatus('error'); });
            };

            const saveToCloudDebounced = (dataToUpdate) => {
                if(!db) return;
                pendingDataRef.current = { ...(pendingDataRef.current || {}), ...dataToUpdate };
                setSyncStatus('pending');
                if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
                debounceTimerRef.current = setTimeout(() => {
                    const dataToSave = pendingDataRef.current;
                    pendingDataRef.current = null;
                    debounceTimerRef.current = null;
                    saveToCloudImmediate(dataToSave);
                }, 1500);
            };

            // Flush salvataggio pendente alla chiusura pagina
            useEffect(() => {
                const handleBeforeUnload = () => {
                    if (pendingDataRef.current && db) {
                        const fullData = { recipes, checkedItems, weeklyPlans, dietPlans, fridgeIngredients, pantry, customCategories, lastUpdate: new Date().toISOString(), ...pendingDataRef.current };
                        navigator.sendBeacon && db.collection('app_pasti').doc(DOC_ID).set(fullData);
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            });

            // Alias per compatibilità - operazioni "pesanti" usano immediate
            const saveToCloud = saveToCloudImmediate;

            useEffect(() => {
                if(!db) return;
                const unsubscribe = db.collection('app_pasti').doc(DOC_ID)
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            const loadedRecipes = data.recipes || DEFAULT_RECIPES;
                            setRecipes(loadedRecipes);

                            // Carica piani alimentari configurati
                            const loadedDietPlans = data.dietPlans || DEFAULT_DIET_PLANS;
                            setDietPlans(loadedDietPlans);

                            if (data.checkedItems) {
                                const ci = data.checkedItems;
                                const keys = Object.keys(ci);
                                const isOldFormat = keys.length > 0 && typeof ci[keys[0]] === 'boolean';
                                if (isOldFormat) {
                                    const migrated = { [currentWeekKey]: ci };
                                    setCheckedItems(migrated);
                                    saveToCloudImmediate({ checkedItems: migrated });
                                } else {
                                    setCheckedItems(ci);
                                }
                            }

                            // Carica piani settimanali e migra formati vecchi
                            if (data.weeklyPlans) {
                                let plans = data.weeklyPlans;
                                let needsSave = false;
                                const migratedPlans = {};
                                Object.keys(plans).forEach(key => {
                                    let weekPlan = plans[key];
                                    // Migra da nome ricetta a ID
                                    const { migrated: idMigrated, changed } = migratePlanToIds(weekPlan, loadedRecipes);
                                    weekPlan = idMigrated;
                                    if (changed) needsSave = true;
                                    // Migra da vecchio formato (myRecipe/famRecipe) a tracks
                                    const trackMigrated = weekPlan.map(slot => migrateSlotToTracks(slot, loadedDietPlans));
                                    if (trackMigrated.some((s, i) => s !== weekPlan[i])) needsSave = true;
                                    migratedPlans[key] = trackMigrated;
                                });
                                setWeeklyPlans(migratedPlans);
                                if (needsSave) saveToCloudImmediate({ weeklyPlans: migratedPlans, recipes: loadedRecipes, dietPlans: loadedDietPlans });
                            } else if (data.plan) {
                                const { migrated } = migratePlanToIds(data.plan, loadedRecipes);
                                const trackMigrated = migrated.map(slot => migrateSlotToTracks(slot, loadedDietPlans));
                                setWeeklyPlans({ [currentWeekKey]: trackMigrated });
                            }

                            if (data.fridgeIngredients) {
                                setFridgeIngredients(data.fridgeIngredients);
                            }

                            if (data.pantry) {
                                setPantry(data.pantry);
                            }
                            if (data.customCategories) {
                                setCustomCategories(data.customCategories);
                            }

                            if (data.lastUpdate) {
                                const date = new Date(data.lastUpdate);
                                setLastSaveTime(date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                            }
                            setSyncStatus('saved');
                        } else {
                            const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                            saveToCloudImmediate({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {}, dietPlans: DEFAULT_DIET_PLANS });
                        }
                    }, (error) => {
                        console.error("Errore Sync:", error);
                        setSyncStatus('error');
                        if (error.code === 'permission-denied') {
                            setSyncError('Permessi Firebase insufficienti. Aggiorna le regole di sicurezza nella console Firebase.');
                        }
                    });
                return () => unsubscribe();
            }, []);

            const changeWeek = (days) => {
                // Flush pendente prima di cambiare settimana
                if (pendingDataRef.current) {
                    saveToCloudImmediate(pendingDataRef.current);
                }
                const newDate = new Date(currentWeekStart);
                newDate.setDate(newDate.getDate() + days);
                setCurrentWeekStart(newDate);
            };

            const updatePlan = (index, trackId, field, value) => {
                const newPlan = plan.map((slot, i) => {
                    if (i !== index) return slot;
                    if (!trackId) {
                        // Campo a livello slot (es: note)
                        return { ...slot, [field]: value };
                    }
                    const tracks = { ...(slot.tracks || {}) };
                    const track = { ...(tracks[trackId] || { type: '', recipe: '', portions: 1 }) };
                    track[field] = value;
                    if (field === 'type') track.recipe = '';
                    tracks[trackId] = track;
                    return { ...slot, tracks };
                });
                const newWeeklyPlans = { ...weeklyPlans, [currentWeekKey]: newPlan };
                setWeeklyPlans(newWeeklyPlans);
                saveToCloudDebounced({ weeklyPlans: newWeeklyPlans });
            };

            // checkedItems ora è { weekKey: { itemName: bool } }
            const weekChecked = checkedItems[currentWeekKey] || {};

            const toggleCheck = (name) => {
                const newWeekChecked = { ...weekChecked, [name]: !weekChecked[name] };
                const newChecked = { ...checkedItems, [currentWeekKey]: newWeekChecked };
                setCheckedItems(newChecked);
                saveToCloudDebounced({ checkedItems: newChecked });
            };

            const handleEditRecipe = (recipeToEdit) => {
                setEditingRecipe(recipeToEdit);
                setIsModalOpen(true);
            };

            const handleAddRecipe = () => {
                setEditingRecipe(null); 
                setIsModalOpen(true);
            };

            const saveRecipeFromForm = (formData) => {
                let updatedRecipes;
                if (formData.id) updatedRecipes = recipes.map(r => r.id === formData.id ? formData : r);
                else updatedRecipes = [...recipes, { ...formData, id: Date.now() }];
                setRecipes(updatedRecipes);
                saveToCloud({ recipes: updatedRecipes });
                setIsModalOpen(false);
                setEditingRecipe(null);
            };

            const deleteRecipe = (id) => {
                if(confirm("Eliminare ricetta per tutti?")) {
                    const newRecipes = recipes.filter(r => r.id !== id);
                    setRecipes(newRecipes);
                    saveToCloud({ recipes: newRecipes });
                }
            };

            const resetData = () => {
                if(confirm("ATTENZIONE: Questo cancellerà le tue modifiche attuali e ripristinerà il database predefinito. Sei sicuro?")) {
                    const initialPlans = { [currentWeekKey]: DEFAULT_PLAN };
                    saveToCloud({ recipes: DEFAULT_RECIPES, weeklyPlans: initialPlans, checkedItems: {}, dietPlans: DEFAULT_DIET_PLANS });
                    alert("Database ripristinato!");
                }
            };

            // Funzione Esportazione CSV
            window.exportRecipesCSV = () => {
                const headers = ["ID", "Tipo", "Nome", "Ingredienti"];
                const rows = recipes.map(r => {
                    const ingStr = r.ingredients.map(i => `${i.name} ${i.qty}${i.unit}`).join('; ');
                    const safeName = `"${r.name.replace(/"/g, '""')}"`;
                    const safeIng = `"${ingStr.replace(/"/g, '""')}"`;
                    return [r.id, r.type, safeName, safeIng].join(',');
                });
                const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join('\n');
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `ricette_backup_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Funzione Importazione CSV
            const handleImportRecipes = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!confirm("ATTENZIONE: L'importazione sovrascriverà le ricette attuali con quelle del file CSV. Vuoi continuare?")) {
                    e.target.value = null; // Reset input
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const csvText = event.target.result;
                        const lines = csvText.split('\n').filter(l => l.trim() !== '');
                        const newRecipes = [];

                        // Skip header (row 0)
                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i];
                            // Regex robusta per CSV che gestisce le virgole dentro le virgolette
                            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                            
                            // Ci aspettiamo almeno 4 colonne: ID, Tipo, Nome, Ingredienti
                            // Nota: la regex sopra potrebbe non catturare campi vuoti correttamente in tutti i casi edge, 
                            // ma funziona per il formato export generato.
                            // Un approccio più semplice per il nostro formato specifico:
                            // ID e Tipo sono numeri/semplici. Nome e Ingredienti sono virgolettati.
                            
                            // Usiamo una logica di split più manuale per sicurezza sui dati generati
                            // ID,Tipo,"Nome","Ing..."
                            const firstComma = line.indexOf(',');
                            const secondComma = line.indexOf(',', firstComma + 1);
                            const firstQuote = line.indexOf('"');
                            
                            if (firstComma === -1 || secondComma === -1) continue;

                            const id = parseInt(line.substring(0, firstComma));
                            const type = line.substring(firstComma + 1, secondComma);
                            
                            // Parsare Nome e Ingredienti (assumendo siano tra virgolette)
                            // Trova la parte dopo il secondo comma
                            const rest = line.substring(secondComma + 1).trim();
                            // Regex per estrarre due stringhe tra virgolette separate da virgola
                            const parts = rest.match(/"([^"]*)"\s*,\s*"([^"]*)"/);
                            
                            let name = "";
                            let ingStr = "";

                            if (parts && parts.length >= 3) {
                                name = parts[1].replace(/""/g, '"');
                                ingStr = parts[2].replace(/""/g, '"');
                            } else {
                                // Fallback se il formato non è standard (es. editato a mano senza quotes)
                                // Questo è rischioso, ma proviamo
                                const simpleParts = rest.split(',');
                                name = simpleParts[0];
                                ingStr = simpleParts.slice(1).join(',');
                            }

                            // Parsare ingredienti: "Pasta 80g; Pomodoro 100ml"
                            const ingredients = [];
                            if (ingStr) {
                                const ingItems = ingStr.split(';');
                                ingItems.forEach(item => {
                                    item = item.trim();
                                    // Regex: Nome QuantitàUnità (es. "Pasta 80g" o "Olio 10ml")
                                    // Cerca l'ultima parte numerica+testo
                                    const match = item.match(/^(.*)\s+(\d+(?:[.,]\d+)?)([a-zA-Z]+)$/);
                                    if (match) {
                                        ingredients.push({
                                            name: match[1].trim(),
                                            qty: parseFloat(match[2].replace(',', '.')),
                                            unit: match[3]
                                        });
                                    }
                                });
                            }

                            if (name) {
                                newRecipes.push({
                                    id: id || Date.now() + i, // Mantieni ID o genera nuovo
                                    type: type.toString(),
                                    name: name,
                                    ingredients: ingredients
                                });
                            }
                        }

                        if (newRecipes.length > 0) {
                            setRecipes(newRecipes);
                            saveToCloud({ recipes: newRecipes });
                            alert(`Importazione completata! Caricate ${newRecipes.length} ricette.`);
                        } else {
                            alert("Nessuna ricetta valida trovata nel file CSV.");
                        }

                    } catch (err) {
                        console.error("Errore importazione CSV:", err);
                        alert("Errore durante la lettura del file CSV.");
                    }
                    e.target.value = null; // Reset input
                };
                reader.readAsText(file);
            };

            const handlePrint = () => {
                const printArea = document.getElementById('print-area');
                const dates = getDatesOfWeek(currentWeekStart);
                const colWidth = Math.floor(90 / dietPlans.length);
                const printHTML = `
                    <div style="font-family: sans-serif; color: #333;">
                        <h1 style="text-align: center; margin-bottom: 20px;">Menu Settimanale: ${formatDateDisplay(currentWeekStart)}</h1>
                        <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                            <thead>
                                <tr style="background: #eee;">
                                    <th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: 10%;">Giorno</th>
                                    ${dietPlans.map(dp => `<th style="border: 1px solid #ccc; padding: 5px; text-align: left; width: ${colWidth}%;">${escapeHtml(dp.name)}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${plan.map((slot, i) => {
                                    const date = dates[Math.floor(i/2)];
                                    const dateStr = date.toLocaleDateString('it-IT', {weekday:'short', day:'numeric'});
                                    const rowStyle = i % 2 === 0 ? 'border-top: 2px solid #aaa;' : 'border-bottom: 1px solid #ddd;';
                                    const mealLabel = slot.meal.toUpperCase();

                                    return `
                                        <tr style="${rowStyle}">
                                            <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                <strong>${i%2===0 ? escapeHtml(dateStr) : ''}</strong>
                                                <div style="font-size: 0.8em; color: #666; margin-top: 2px;">${escapeHtml(mealLabel)}</div>
                                            </td>
                                            ${dietPlans.map(dp => {
                                                const track = slot.tracks?.[dp.id] || {};
                                                const rec = getRecipeById(track.recipe, recipes);
                                                const recName = escapeHtml(rec ? rec.name : (track.recipe ? '[Rimossa]' : '-'));
                                                const ing = escapeHtml(getIngredientsSummary(track.recipe, track.portions, recipes));
                                                const typeLabel = !dp.isFreeTrack && track.type && track.type !== 'LIBERO' ? `<div style="font-size: 0.8em;">${escapeHtml(track.type)}</div>` : '';
                                                return `
                                                    <td style="padding: 5px; border-right: 1px solid #ccc; vertical-align: top;">
                                                        <div style="font-weight: bold;">${recName}</div>
                                                        ${typeLabel}
                                                        ${ing ? `<div style="font-size: 0.8em; color: #555; margin-top: 2px; font-style: italic;">(${ing})</div>` : ''}
                                                    </td>
                                                `;
                                            }).join('')}
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                printArea.innerHTML = printHTML;
                window.print();
            };

            const currentFridgeList = fridgeIngredients[currentWeekKey] || [];

            // Lista di tutti i nomi ingredienti unici (per autocomplete dispensa)
            const allIngredientNames = useMemo(() => {
                const names = new Set();
                recipes.forEach(r => r.ingredients?.forEach(i => names.add(i.name)));
                pantry.forEach(p => names.add(p.name));
                Object.keys(INGREDIENT_CATEGORIES).forEach(k => names.add(k));
                return Array.from(names).sort();
            }, [recipes, pantry]);

            const [isReceiptModalOpen, setIsReceiptModalOpen] = useState(false);

            // --- SPESA INTELLIGENTE: necessario - disponibile in dispensa ---
            const shoppingList = useMemo(() => {
                const needed = {};
                plan.forEach(slot => {
                    if (!slot.tracks) return;
                    Object.values(slot.tracks).forEach(track => {
                        const rec = getRecipeById(track.recipe, recipes);
                        if (rec) {
                            rec.ingredients.forEach(ing => {
                                if (ing.unit === 'qb') return;
                                const key = `${ing.name.toLowerCase()}|${ing.unit}`;
                                if (!needed[key]) needed[key] = { name: ing.name, unit: ing.unit, qty: 0 };
                                needed[key].qty += ing.qty * (track.portions || 0);
                            });
                        }
                    });
                });

                // Sottrai quantita disponibili in dispensa
                Object.values(needed).forEach(item => {
                    const nameLower = item.name.toLowerCase();
                    const matches = pantry.filter(p =>
                        p.name.toLowerCase() === nameLower && p.unit === item.unit
                    );
                    const available = matches.reduce((sum, m) => sum + m.qty, 0);
                    if (available > 0) {
                        item.available = available;
                        item.qty = Math.max(0, item.qty - available);
                    }
                });

                return Object.values(needed)
                    .filter(item => item.qty > 0)
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [plan, recipes, pantry]);

            // Prodotti completamente coperti dalla dispensa
            const pantryCovered = useMemo(() => {
                const needed = {};
                plan.forEach(slot => {
                    if (!slot.tracks) return;
                    Object.values(slot.tracks).forEach(track => {
                        const rec = getRecipeById(track.recipe, recipes);
                        if (rec) {
                            rec.ingredients.forEach(ing => {
                                if (ing.unit === 'qb') return;
                                const key = `${ing.name.toLowerCase()}|${ing.unit}`;
                                if (!needed[key]) needed[key] = { name: ing.name, unit: ing.unit, qty: 0 };
                                needed[key].qty += ing.qty * (track.portions || 0);
                            });
                        }
                    });
                });
                return Object.values(needed).filter(item => {
                    const nameLower = item.name.toLowerCase();
                    const available = pantry.filter(p => p.name.toLowerCase() === nameLower && p.unit === item.unit)
                        .reduce((sum, m) => sum + m.qty, 0);
                    return available >= item.qty && item.qty > 0;
                });
            }, [plan, recipes, pantry]);

            const handleCopy = () => {
                const text = shoppingList.map(item => `- ${item.name}: ${item.qty} ${item.unit}`).join('\n');
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); alert("Copiato!"); } catch (e) {}
                document.body.removeChild(ta);
            };
