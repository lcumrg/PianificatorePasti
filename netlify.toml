[build]
  command = "npm install && npx tailwindcss -i ./src/input.css -o ./dist/styles.css --minify && mkdir -p dist && cp index.html manifest.json sw.js dist/"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
